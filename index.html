<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мессенджер</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f7f6f3;
      --surface: #f9f9f8;
      --text: #111111;
      --muted: #787774;
      --border: #eaeaea;
      --accent: #dfeee5;
      --accent-strong: #111111;
      --tap: 46px;
      --radius-sm: 8px;
      --radius: 12px;
      --transition: 180ms ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Pro Text", "Geist", "Helvetica Neue", Arial, sans-serif;
    }

    body { overflow: hidden; }

    button, input, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), opacity var(--transition);
    }

    button:hover { background: var(--bg-soft); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }


    button:focus-visible,
    .input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid #94b8a4;
      outline-offset: 1px;
    }


    #authPage {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg-soft);
    }

    .auth-card {
      width: min(100%, 420px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      padding: 28px;
    }

    .auth-title {
      font-size: 1.5rem;
      line-height: 1.2;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      min-height: var(--tap);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      font-weight: 500;
    }

    .tab.active {
      background: var(--bg-soft);
      border-color: #d6d6d6;
    }

    .field { margin-top: 12px; }

    .field label {
      display: block;
      color: var(--muted);
      font-size: .76rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input {
      width: 100%;
      min-height: var(--tap);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      padding: 11px 12px;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    .input::placeholder { color: var(--muted); }
    .input:focus {
      border-color: #d5d5d5;
      background: var(--surface);
    }

    .primary-btn {
      width: 100%;
      min-height: var(--tap);
      margin-top: 14px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      border-radius: 6px;
      font-weight: 500;
    }

    .primary-btn:hover { background: #202020; }

    #authStatus {
      min-height: 20px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    #authStatus.error { color: #b3261e; }

    #chatPage {
      display: none;
      height: 100dvh;
      grid-template-columns: minmax(270px, 340px) 1fr;
      background: var(--bg);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }

    .sidebar-head,
    .sidebar-search,
    .sidebar-actions {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .profile-login { font-size: 1.05rem; font-weight: 600; }
    .profile-sub { font-size: .8rem; color: var(--muted); margin-top: 3px; }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-item {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      min-height: var(--tap);
      border: 0;
      border-radius: 10px;
      background: transparent;
      border-left: 2px solid transparent;
    }

    .chat-item:hover { background: var(--surface); }

    .chat-item.active {
      background: var(--bg-soft);
      border-left-color: #b6d8c5;
    }

    .chat-main {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }

    .chat-name { font-weight: 500; font-size: .95rem; }
    .chat-time { font-size: .73rem; color: var(--muted); white-space: nowrap; }
    .chat-preview {
      margin-top: 4px;
      font-size: .82rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ghost {
      color: var(--muted);
      font-size: .84rem;
      padding: 10px 12px;
    }

    .sidebar-actions .danger,
    .danger {
      min-height: var(--tap);
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg);
      color: #6b1a16;
    }

    .chat-view {
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .chat-header {
      min-height: 74px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      gap: 12px;
      background: var(--bg);
    }

    .chat-title {
      font-size: 1.22rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .chat-meta {
      margin-top: 4px;
      color: #5f5f5c;
      font-size: .82rem;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .menu-btn,
    .subtle-btn {
      min-height: var(--tap);
      padding: 8px 12px;
      width: auto;
      background: var(--bg);
    }

    #chatCode { color: var(--muted); font-size: .76rem; }

    .message-viewport {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 24px 16px;
      background: var(--bg);
    }

    #messages {
      width: min(100%, 720px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      margin: auto;
      max-width: 520px;
      padding: 40px 20px;
    }

    .message {
      animation: fadeInUp 180ms ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message.outgoing { align-items: flex-end; }

    .message-block {
      max-width: min(90%, 560px);
      width: fit-content;
      padding: 0;
    }

    .message-head {
      font-size: .84rem;
      font-weight: 500;
      color: var(--muted);
      display: flex;
      gap: 8px;
      align-items: baseline;
      justify-content: space-between;
    }

    .message-text {
      margin-top: 6px;
      font-size: 0.98rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .message-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .delete-msg {
      min-height: 34px;
      font-size: .78rem;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--bg);
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: var(--bg);
    }

    .composer-inner {
      width: min(100%, 680px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    #messageInput {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: var(--surface);
      line-height: 1.55;
      font-size: 0.97rem;
    }

    #sendBtn {
      min-width: 112px;
      min-height: 44px;
      border-radius: 6px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      padding: 0 14px;
      align-self: stretch;
    }

    #sendBtn:hover { background: #202020; }

    .mobile-back { display: none; }

    @media (max-width: 860px) {
      #chatPage {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
      }

      .chat-view,
      .sidebar {
        position: absolute;
        inset: 0;
        background: var(--bg);
      }

      #chatPage.state-list .chat-view { display: none; }
      #chatPage.state-chat .sidebar { display: none; }

      .mobile-back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
      }

      .chat-header {
        min-height: 68px;
        padding: 10px 12px;
      }

      .header-controls {
        gap: 6px;
      }

      #chatCode { display: none; }

      .composer-inner {
        grid-template-columns: 1fr;
      }

      #sendBtn {
        min-height: 46px;
        width: 100%;
      }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <section id="authPage">
    <div class="auth-card">
      <h1 class="auth-title">Мессенджер</h1>
      <div class="tabs">
        <button type="button" class="tab active" id="loginTab">Вход</button>
        <button type="button" class="tab" id="registerTab">Регистрация</button>
      </div>

      <form id="authForm" autocomplete="off">
        <div class="field">
          <label for="usernameInput">Логин</label>
          <input class="input" id="usernameInput" required minlength="3" maxlength="24" pattern="[A-Za-z0-9_.\-]{3,24}" placeholder="Например: max_user" />
        </div>

        <div class="field">
          <label for="passwordInput">Пароль</label>
          <input class="input" id="passwordInput" required type="password" minlength="6" maxlength="64" placeholder="Минимум 6 символов" />
        </div>

        <button id="authSubmit" class="primary-btn" type="submit">Войти</button>
      </form>

      <div id="authStatus">Готово.</div>
    </div>
  </section>

  <section id="chatPage" class="state-list">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="profile-login" id="meLogin">@unknown</div>
        <div class="profile-sub">Focused communication mode</div>
      </div>

      <div class="sidebar-search">
        <input class="input" id="searchInput" placeholder="Поиск по логину" />
      </div>

      <div id="searchResults" class="list"></div>
      <div id="dialogsList" class="list"></div>

      <div class="sidebar-actions">
        <button class="danger" id="logoutBtn" type="button">Выйти</button>
      </div>
    </aside>

    <main class="chat-view">
      <header class="chat-header">
        <div class="header-controls">
          <button id="mobileBack" class="subtle-btn mobile-back" type="button" aria-label="Назад">←</button>
          <div>
            <div class="chat-title" id="chatTitle">Выберите диалог</div>
            <div class="chat-meta" id="presence">Статус: —</div>
          </div>
        </div>
        <div class="header-controls">
          <div id="chatCode">chat: ---</div>
          <button id="deleteChatBtn" class="subtle-btn" type="button" disabled>Удалить чат</button>
        </div>
      </header>

      <div class="message-viewport" id="messageViewport">
        <div id="messages">
          <div class="empty">Найдите пользователя по логину, откройте диалог и начните переписку.</div>
        </div>
      </div>

      <form id="composer" class="composer">
        <div class="composer-inner">
          <textarea id="messageInput" maxlength="1500" placeholder="Write a message..."></textarea>
          <button id="sendBtn" type="submit">Отправить</button>
        </div>
      </form>
    </main>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    import {
      getDatabase,
      ref,
      get,
      set,
      update,
      push,
      remove,
      query,
      orderByChild,
      startAt,
      endAt,
      limitToLast,
      onValue,
      onDisconnect,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBalx-yReG31BkexcSYkX6CknHh_m_St2M",
      authDomain: "messanger-b98dd.firebaseapp.com",
      databaseURL: "https://messanger-b98dd-default-rtdb.firebaseio.com",
      projectId: "messanger-b98dd",
      storageBucket: "messanger-b98dd.firebasestorage.app",
      messagingSenderId: "389022023604",
      appId: "1:389022023604:web:5e89db01e9b9fa1aa8bce1",
      measurementId: "G-VRV1YXQRP2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    analyticsSupported().then((ok) => { if (ok) getAnalytics(app); }).catch(() => {});

    const LS_SESSION = "messenger_session_v4";
    const MAX_MESSAGE_LENGTH = 1500;
    const $ = (id) => document.getElementById(id);

    const appState = {
      authMode: "login",
      currentUser: null,
      activePeer: "",
      activeChatId: "",
      isAuthSubmitting: false,
      isSendingMessage: false,
      unsubscribers: {
        dialogs: null,
        messages: null,
        presence: null
      }
    };

    const toKey = (value) => String(value || "").trim().toLowerCase();
    const isValidLogin = (login) => /^[a-zA-Z0-9_.-]{3,24}$/.test(String(login || ""));
    const chatIdByUsers = (a, b) => [toKey(a), toKey(b)].sort().join("__");

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    const formatTime = (ts) => {
      if (!Number(ts)) return "--:--";
      return new Date(ts).toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    };

    const debounce = (fn, delay = 220) => {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    };

    function setStatus(text, isError = false) {
      const el = $("authStatus");
      el.textContent = text;
      el.className = isError ? "error" : "";
    }

    function setComposerEnabled(enabled) {
      $("messageInput").disabled = !enabled;
      $("sendBtn").disabled = !enabled || appState.isSendingMessage;
      $("messageInput").placeholder = enabled ? "Напишите сообщение..." : "Откройте диалог, чтобы писать сообщения";
    }

    function clearAuthArtifacts() {
      localStorage.removeItem(LS_SESSION);
      sessionStorage.removeItem(LS_SESSION);
      document.cookie = `${LS_SESSION}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`;
      document.cookie = `messenger_session=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`;
    }

    function setAuthLoading(loading) {
      appState.isAuthSubmitting = loading;
      ["authSubmit", "loginTab", "registerTab", "usernameInput", "passwordInput"].forEach((id) => {
        const node = $(id);
        if (node) node.disabled = loading;
      });
      $("authSubmit").textContent = loading
        ? (appState.authMode === "login" ? "Вход..." : "Регистрация...")
        : (appState.authMode === "login" ? "Войти" : "Зарегистрироваться");
    }

    function setAuthMode(nextMode) {
      if (appState.isAuthSubmitting) return;
      appState.authMode = nextMode;
      $("loginTab").classList.toggle("active", nextMode === "login");
      $("registerTab").classList.toggle("active", nextMode === "register");
      $("authSubmit").textContent = nextMode === "login" ? "Войти" : "Зарегистрироваться";
      setStatus(nextMode === "login" ? "Режим входа." : "Режим регистрации.");
    }

    function setMobileState(stateName) {
      const root = $("chatPage");
      root.classList.remove("state-list", "state-chat");
      root.classList.add(stateName);
    }

    function guardAuthAccess() {
      if (appState.currentUser) return true;
      $("chatPage").style.display = "none";
      $("authPage").style.display = "grid";
      setComposerEnabled(false);
      return false;
    }

    function stopWatcher(name) {
      const unwatch = appState.unsubscribers[name];
      if (typeof unwatch === "function") unwatch();
      appState.unsubscribers[name] = null;
    }

    function stopAllWatchers() {
      stopWatcher("dialogs");
      stopWatcher("messages");
      stopWatcher("presence");
    }

    function resetActiveChatUi(message = "Найдите пользователя по логину, откройте диалог и начните переписку.") {
      appState.activePeer = "";
      appState.activeChatId = "";
      $("chatTitle").textContent = "Выберите диалог";
      $("presence").textContent = "Статус: —";
      $("chatCode").textContent = "chat: ---";
      $("deleteChatBtn").disabled = true;
      $("messages").innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
      setComposerEnabled(false);
    }

    function renderSearch(users) {
      const root = $("searchResults");
      root.innerHTML = "";
      if (!users.length) {
        root.innerHTML = '<div class="ghost">Пользователи не найдены</div>';
        return;
      }
      const fragment = document.createDocumentFragment();
      users.forEach((user) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `chat-item ${appState.activePeer === user.username ? "active" : ""}`;
        btn.dataset.peer = user.username;
        btn.innerHTML = `<div class="chat-main"><span class="chat-name">@${escapeHtml(user.username)}</span><span class="chat-time">новый</span></div><div class="chat-preview">Открыть диалог</div>`;
        fragment.appendChild(btn);
      });
      root.appendChild(fragment);
    }

    function renderDialogs(dialogs) {
      const root = $("dialogsList");
      root.innerHTML = "";
      if (!dialogs.length) {
        root.innerHTML = '<div class="ghost">Пока нет диалогов</div>';
        return;
      }
      const fragment = document.createDocumentFragment();
      dialogs.forEach((dialog) => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = `chat-item ${appState.activePeer === dialog.peer ? "active" : ""}`;
        item.dataset.peer = dialog.peer;
        item.innerHTML = `
          <div class="chat-main">
            <span class="chat-name">@${escapeHtml(dialog.peer)}</span>
            <span class="chat-time">${formatTime(dialog.lastAt)}</span>
          </div>
          <div class="chat-preview">${escapeHtml(dialog.lastMessage || "Пусто")}</div>
        `;
        fragment.appendChild(item);
      });
      root.appendChild(fragment);
    }

    function renderMessages(items) {
      const root = $("messages");
      root.innerHTML = "";
      if (!items.length) {
        root.innerHTML = '<div class="empty">Диалог открыт. Напишите первое сообщение.</div>';
        return;
      }
      const fragment = document.createDocumentFragment();
      items.forEach((message) => {
        const isMine = appState.currentUser && message.fromKey === appState.currentUser.usernameKey;
        const el = document.createElement("article");
        el.className = `message ${isMine ? "outgoing" : "incoming"}`;
        el.innerHTML = `
          <div class="message-block">
            <div class="message-head">
              <span>@${escapeHtml(message.from || "unknown")}</span>
              <time>${formatTime(message.createdAt)}</time>
            </div>
            <div class="message-text">${escapeHtml(message.text || "")}</div>
          </div>
        `;
        if (isMine) {
          const actions = document.createElement("div");
          actions.className = "message-actions";
          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "delete-msg";
          removeBtn.textContent = "Удалить";
          removeBtn.dataset.messageId = message.id;
          actions.appendChild(removeBtn);
          el.querySelector(".message-block").appendChild(actions);
        }
        fragment.appendChild(el);
      });
      root.appendChild(fragment);
      const viewport = $("messageViewport");
      viewport.scrollTop = viewport.scrollHeight;
    }

    async function hashPassword(raw) {
      const data = new TextEncoder().encode(String(raw || ""));
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash)).map((byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    async function syncChatPreview(chatId, leftUsername, rightUsername) {
      const leftKey = toKey(leftUsername);
      const rightKey = toKey(rightUsername);
      const lastSnap = await get(query(ref(db, `chats/${chatId}/messages`), limitToLast(1)));
      const raw = lastSnap.val() || {};
      const lastMessage = Object.values(raw)[0];

      if (!lastMessage) {
        await update(ref(db), {
          [`userChats/${leftKey}/${chatId}`]: null,
          [`userChats/${rightKey}/${chatId}`]: null
        });
        return;
      }

      const previewText = String(lastMessage.text || "").slice(0, 120);
      const previewDate = Number(lastMessage.createdAt || Date.now());
      await update(ref(db), {
        [`userChats/${leftKey}/${chatId}`]: { peer: rightUsername, chatId, lastMessage: previewText, lastAt: previewDate },
        [`userChats/${rightKey}/${chatId}`]: { peer: leftUsername, chatId, lastMessage: previewText, lastAt: previewDate }
      });
    }

    async function register(login, password) {
      const username = String(login || "").trim();
      const usernameKey = toKey(username);
      const userRef = ref(db, `users/${usernameKey}`);

      if ((await get(userRef)).exists()) {
        throw new Error("Такой логин уже занят.");
      }

      const passHash = await hashPassword(password);
      const userPayload = {
        username,
        usernameKey,
        passHash,
        createdAt: Date.now(),
        lastSeen: Date.now()
      };

      await set(userRef, userPayload);
      return { username, usernameKey };
    }

    async function login(loginValue, password) {
      const usernameKey = toKey(loginValue);
      const userSnap = await get(ref(db, `users/${usernameKey}`));
      if (!userSnap.exists()) {
        throw new Error("Пользователь не найден.");
      }
      const user = userSnap.val();
      const passHash = await hashPassword(password);
      if (user.passHash !== passHash) {
        throw new Error("Неверный пароль.");
      }
      await update(ref(db, `users/${usernameKey}`), { lastSeen: Date.now() });
      return { username: user.username, usernameKey: user.usernameKey };
    }

    async function setOnlinePresence() {
      const me = appState.currentUser;
      if (!me) return;
      const presenceRef = ref(db, `presence/${me.usernameKey}`);
      await set(presenceRef, { username: me.username, online: true, lastSeen: serverTimestamp() });
      onDisconnect(presenceRef).update({ online: false, lastSeen: serverTimestamp() });
    }

    function watchDialogs() {
      stopWatcher("dialogs");
      const me = appState.currentUser;
      if (!me) return;
      appState.unsubscribers.dialogs = onValue(ref(db, `userChats/${me.usernameKey}`), (snap) => {
        const rows = Object.values(snap.val() || {})
          .filter((row) => row && !row.hidden && row.peer)
          .sort((a, b) => (b.lastAt || 0) - (a.lastAt || 0));
        renderDialogs(rows);
      });
    }

    function watchMessages() {
      stopWatcher("messages");
      if (!appState.activeChatId) return;
      const q = query(ref(db, `chats/${appState.activeChatId}/messages`), limitToLast(200));
      appState.unsubscribers.messages = onValue(q, (snap) => {
        const rows = Object.entries(snap.val() || {})
          .map(([id, value]) => ({ id, ...value }))
          .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        renderMessages(rows);
      });
    }

    function watchPresence() {
      stopWatcher("presence");
      if (!appState.activePeer) {
        $("presence").textContent = "Статус: —";
        return;
      }
      appState.unsubscribers.presence = onValue(ref(db, `presence/${toKey(appState.activePeer)}`), (snap) => {
        const online = Boolean(snap.val()?.online);
        $("presence").textContent = `Статус: ${online ? "онлайн" : "оффлайн"}`;
      });
    }

    async function openDialog(peerLogin) {
      if (!guardAuthAccess()) return;
      const safePeer = String(peerLogin || "").trim();
      if (!isValidLogin(safePeer) || toKey(safePeer) === appState.currentUser.usernameKey) return;

      appState.activePeer = safePeer;
      appState.activeChatId = chatIdByUsers(appState.currentUser.username, safePeer);
      $("chatTitle").textContent = `Диалог с @${safePeer}`;
      $("chatCode").textContent = `chat: ${appState.activeChatId}`;
      $("deleteChatBtn").disabled = false;
      setComposerEnabled(true);
      watchPresence();
      watchMessages();
      watchDialogs();
      if (window.matchMedia("(max-width: 860px)").matches) {
        setMobileState("state-chat");
      }
    }

    async function sendMessage(text) {
      const me = appState.currentUser;
      if (!guardAuthAccess() || !appState.activePeer || !appState.activeChatId || !me) return;
      const clean = String(text || "").replace(/\s+/g, " ").trim().slice(0, MAX_MESSAGE_LENGTH);
      if (!clean) return;

      const now = Date.now();
      const payload = {
        from: me.username,
        fromKey: me.usernameKey,
        to: appState.activePeer,
        text: clean,
        createdAt: now
      };
      await push(ref(db, `chats/${appState.activeChatId}/messages`), payload);

      const myDialog = { peer: appState.activePeer, chatId: appState.activeChatId, lastMessage: clean.slice(0, 120), lastAt: now };
      const peerDialog = { peer: me.username, chatId: appState.activeChatId, lastMessage: clean.slice(0, 120), lastAt: now };
      await update(ref(db), {
        [`userChats/${me.usernameKey}/${appState.activeChatId}`]: myDialog,
        [`userChats/${toKey(appState.activePeer)}/${appState.activeChatId}`]: peerDialog,
        [`users/${me.usernameKey}/lastSeen`]: now
      });
    }

    async function deleteMessage(messageId) {
      const me = appState.currentUser;
      if (!guardAuthAccess() || !appState.activeChatId || !appState.activePeer || !messageId || !me) return;
      const messageRef = ref(db, `chats/${appState.activeChatId}/messages/${messageId}`);
      const snap = await get(messageRef);
      if (!snap.exists()) return;
      const message = snap.val();
      if (message.fromKey !== me.usernameKey) {
        alert("Можно удалять только свои сообщения.");
        return;
      }
      await remove(messageRef);
      await syncChatPreview(appState.activeChatId, me.username, appState.activePeer);
    }

    async function deleteChatWithPeer() {
      const me = appState.currentUser;
      const peerUsername = appState.activePeer;
      if (!guardAuthAccess() || !me || !peerUsername) return;

      const chatId = chatIdByUsers(me.username, peerUsername);
      const peerKey = toKey(peerUsername);
      const approved = window.confirm(`Удалить чат с @${peerUsername}? Это действие нельзя отменить.`);
      if (!approved) return;

      await update(ref(db), {
        [`chats/${chatId}`]: null,
        [`userChats/${me.usernameKey}/${chatId}`]: null,
        [`userChats/${peerKey}/${chatId}`]: null
      });

      if (appState.activeChatId === chatId) {
        stopWatcher("messages");
        stopWatcher("presence");
        resetActiveChatUi("Чат удалён. Откройте новый диалог.");
      }
    }

    async function searchUsers(prefix) {
      if (!guardAuthAccess()) return;
      const term = toKey(prefix);
      if (term.length < 2) {
        renderSearch([]);
        return;
      }

      const mapRows = (raw) => Object.values(raw || {})
        .filter((user) => user?.usernameKey !== appState.currentUser.usernameKey)
        .filter((user) => String(user.usernameKey || "").startsWith(term))
        .slice(0, 30)
        .map((user) => ({ username: user.username }));

      try {
        const q = query(ref(db, "users"), orderByChild("usernameKey"), startAt(term), endAt(`${term}`));
        const snap = await get(q);
        renderSearch(mapRows(snap.val()));
      } catch (error) {
        const message = String(error?.message || "");
        const missingIndex = message.includes("Index not defined") || message.includes(".indexOn");
        if (missingIndex) {
          const fullSnap = await get(ref(db, "users"));
          renderSearch(mapRows(fullSnap.val()));
          return;
        }
        console.error("Search error:", error);
        renderSearch([]);
      }
    }

    async function beginSession(user) {
      appState.currentUser = user;
      localStorage.setItem(LS_SESSION, JSON.stringify(user));
      $("meLogin").textContent = `@${user.username}`;
      $("authPage").style.display = "none";
      $("chatPage").style.display = "grid";
      setMobileState("state-list");
      resetActiveChatUi();
      await setOnlinePresence();
      watchDialogs();
    }

    async function logout() {
      const me = appState.currentUser;
      if (me?.usernameKey) {
        await update(ref(db, `presence/${me.usernameKey}`), { online: false, lastSeen: serverTimestamp() });
      }

      stopAllWatchers();
      appState.currentUser = null;
      clearAuthArtifacts();
      $("chatPage").style.display = "none";
      $("authPage").style.display = "grid";
      $("dialogsList").innerHTML = "";
      $("searchResults").innerHTML = "";
      $("messageInput").value = "";
      resetActiveChatUi();
      setMobileState("state-list");
    }

    async function restoreSession() {
      const raw = localStorage.getItem(LS_SESSION);
      if (!raw) return;
      try {
        const session = JSON.parse(raw);
        if (!session?.usernameKey) return;
        const snap = await get(ref(db, `users/${session.usernameKey}`));
        clearAuthArtifacts();
        if (!snap.exists()) {
          setStatus("Сессия устарела. Войдите заново.");
          return;
        }
        const savedUsername = String(snap.val()?.username || "").trim();
        if (savedUsername) {
          $("usernameInput").value = savedUsername;
          $("passwordInput").value = "";
        }
        setStatus("Сессия найдена. Введите пароль для входа.");
      } catch {
        clearAuthArtifacts();
      }
    }

    function bindEvents() {
      $("loginTab").addEventListener("click", () => setAuthMode("login"));
      $("registerTab").addEventListener("click", () => setAuthMode("register"));

      $("authForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (appState.isAuthSubmitting) return;

        const loginValue = $("usernameInput").value.trim();
        const password = $("passwordInput").value;
        if (!isValidLogin(loginValue)) {
          setStatus("Логин: 3-24 символа, только A-Z, 0-9, _, ., -", true);
          return;
        }
        if (password.length < 6) {
          setStatus("Пароль должен быть не короче 6 символов.", true);
          return;
        }

        try {
          setAuthLoading(true);
          setStatus(appState.authMode === "login" ? "Выполняется вход..." : "Выполняется регистрация...");
          const user = appState.authMode === "login"
            ? await login(loginValue, password)
            : await register(loginValue, password);
          await beginSession(user);
          setStatus("Успешно.");
        } catch (error) {
          setStatus(error?.message || "Ошибка авторизации.", true);
        } finally {
          setAuthLoading(false);
        }
      });

      const debouncedSearch = debounce((value) => {
        if (appState.currentUser) searchUsers(value).catch(() => renderSearch([]));
      }, 220);

      $("searchInput").addEventListener("input", (event) => {
        debouncedSearch(event.target.value);
      });

      $("searchResults").addEventListener("click", (event) => {
        const button = event.target.closest("[data-peer]");
        if (!button) return;
        openDialog(button.dataset.peer).catch(() => {});
      });

      $("dialogsList").addEventListener("click", (event) => {
        const button = event.target.closest("[data-peer]");
        if (!button) return;
        openDialog(button.dataset.peer).catch(() => {});
      });

      $("messages").addEventListener("click", (event) => {
        const removeButton = event.target.closest("[data-message-id]");
        if (!removeButton) return;
        deleteMessage(removeButton.dataset.messageId).catch(() => {});
      });

      $("composer").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!appState.currentUser || !appState.activeChatId || appState.isSendingMessage) return;
        const input = $("messageInput");
        const text = input.value;
        input.value = "";
        appState.isSendingMessage = true;
        $("sendBtn").disabled = true;
        $("sendBtn").textContent = "Отправка...";
        try {
          await sendMessage(text);
        } catch {
          input.value = text;
        } finally {
          appState.isSendingMessage = false;
          $("sendBtn").disabled = false;
          $("sendBtn").textContent = "Отправить";
        }
      });

      $("messageInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          $("sendBtn").click();
        }
      });

      $("logoutBtn").addEventListener("click", () => logout().catch(() => {}));
      $("deleteChatBtn").addEventListener("click", () => deleteChatWithPeer().catch(() => {}));
      $("mobileBack").addEventListener("click", () => setMobileState("state-list"));
      window.addEventListener("popstate", () => { guardAuthAccess(); });
    }

    function init() {
      guardAuthAccess();
      setAuthMode("login");
      setComposerEnabled(false);
      bindEvents();
      restoreSession().catch(() => {});
    }

    init();
  </script>
</body>
</html>
