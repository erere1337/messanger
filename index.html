<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messenger</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <section id="authPage" class="page page-auth">
    <div class="auth-card">
      <h1>Messenger</h1>
      <div class="tabs" role="tablist" aria-label="Авторизация">
        <button id="loginTab" class="tab active" type="button">Вход</button>
        <button id="registerTab" class="tab" type="button">Регистрация</button>
      </div>

      <form id="authForm" autocomplete="off">
        <label class="field">Логин
          <input id="usernameInput" class="input" required minlength="3" maxlength="24" pattern="[A-Za-z0-9_.\-]{3,24}" />
        </label>
        <label class="field">Пароль
          <input id="passwordInput" class="input" type="password" required minlength="6" maxlength="64" />
        </label>

        <div id="registerOnlyFields" hidden>
          <label class="field">Имя
            <input id="displayNameInput" class="input" maxlength="64" placeholder="Например: Максим Иванов" />
          </label>
          <label class="field">Статус
            <input id="statusInput" class="input" maxlength="100" placeholder="Короткий статус" />
          </label>
          <label class="field">Аватар
            <input id="avatarInput" class="input" type="file" accept="image/*" />
          </label>
        </div>

        <button id="authSubmit" class="btn-primary" type="submit">Войти</button>
      </form>
      <p id="authStatus" class="status-text">Готово.</p>
    </div>
  </section>

  <section id="chatPage" class="page page-chat" hidden>
    <aside id="leftPanel" class="sidebar">
      <header class="sidebar-head">
        <button id="openProfileBtn" class="identity" type="button">
          <img id="meAvatar" class="avatar avatar-md" alt="me" />
          <div>
            <div id="meName" class="title">@unknown</div>
            <div id="meStatus" class="subtle">—</div>
          </div>
        </button>
      </header>

      <section class="sidebar-search">
        <input id="searchInput" class="input" placeholder="Поиск по логину" />
        <div id="searchResults" class="list"></div>
      </section>

      <section class="sidebar-list">
        <div class="section-row">
          <h2>Чаты</h2>
          <button id="createGroupBtn" class="btn-ghost" type="button">Новая группа</button>
        </div>
        <div id="dialogsList" class="list"></div>
      </section>

      <footer class="sidebar-foot">
        <button id="logoutBtn" class="btn-ghost danger" type="button">Выйти</button>
      </footer>
    </aside>

    <main class="chat-shell">
      <header class="chat-header">
        <button id="mobileBackBtn" class="btn-ghost mobile-only" type="button">←</button>
        <button id="chatIdentityBtn" class="identity" type="button" disabled>
          <img id="chatAvatar" class="avatar avatar-md" alt="chat" />
          <div>
            <div id="chatTitle" class="title">Выберите чат</div>
            <div id="presenceText" class="subtle">Статус: —</div>
          </div>
        </button>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>
      <button id="newMessagesBtn" class="new-messages" hidden>Новые сообщения ↓</button>
      <div id="typingIndicator" class="typing" hidden></div>

      <form id="composer" class="composer">
        <textarea id="messageInput" class="input textarea" rows="1" placeholder="Write a message..."></textarea>
        <button id="sendBtn" class="btn-primary" type="submit">Отправить</button>
      </form>
    </main>
  </section>

  <div id="actionPanel" class="floating-panel" hidden>
    <button id="forwardBtn" class="btn-ghost" type="button">Переслать</button>
    <button id="deleteBtn" class="btn-ghost danger" type="button">Удалить</button>
  </div>

  <dialog id="profileModal" class="modal">
    <form method="dialog" class="modal-card" id="profileForm">
      <h3>Профиль</h3>
      <img id="profileAvatar" class="avatar avatar-lg" alt="profile" />
      <label class="field">Имя
        <input id="profileDisplayName" class="input" maxlength="64" />
      </label>
      <label class="field">Статус
        <input id="profileStatus" class="input" maxlength="100" />
      </label>
      <label class="field" id="profileAvatarField">Аватар
        <input id="profileAvatarInput" class="input" type="file" accept="image/*" />
      </label>
      <p id="profileMeta" class="status-text"></p>
      <div class="row">
        <button id="profileCloseBtn" class="btn-ghost" value="cancel">Закрыть</button>
        <button id="profileSaveBtn" class="btn-primary" type="submit">Сохранить</button>
      </div>
    </form>
  </dialog>

  <dialog id="groupModal" class="modal">
    <form method="dialog" class="modal-card" id="groupForm">
      <h3>Новая группа</h3>
      <label class="field">Название
        <input id="groupNameInput" class="input" maxlength="80" required />
      </label>
      <label class="field">Описание
        <input id="groupDescriptionInput" class="input" maxlength="160" />
      </label>
      <label class="field">Аватар
        <input id="groupAvatarInput" class="input" type="file" accept="image/*" />
      </label>
      <label class="field">Участники (@login через запятую)
        <input id="groupMembersInput" class="input" placeholder="anna, bob, kate" />
      </label>
      <div class="row">
        <button class="btn-ghost" value="cancel">Отмена</button>
        <button class="btn-primary" type="submit">Создать</button>
      </div>
    </form>
  </dialog>

  <dialog id="forwardModal" class="modal">
    <form method="dialog" class="modal-card" id="forwardForm">
      <h3>Переслать сообщение</h3>
      <div id="forwardTargets" class="list"></div>
      <div class="row">
        <button class="btn-ghost" value="cancel">Закрыть</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
