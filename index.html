<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мессенджер</title>
  <style>
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #333;
      --text-primary: white;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --card-bg: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.2);
      --accent: #00d4aa;
      --accent-hover: #00b894;
      --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --header-gradient: linear-gradient(90deg, #667eea, #764ba2);
      --error: #ff7373;
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --card-bg: rgba(255, 255, 255, 0.8);
      --border-color: rgba(0, 0, 0, 0.1);
      --accent: #00d4aa;
      --accent-hover: #00b894;
      --gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      --header-gradient: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
      --error: #d62828;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100dvh;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-y: auto;
      transition: background-color .3s ease, color .3s ease;
    }

    .theme-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
      width: 44px;
      height: 44px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 42px;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: all .3s;
    }

    .theme-toggle:hover {
      background: var(--accent);
      color: white;
      transform: scale(1.1);
      box-shadow: 0 4px 12px rgba(0, 212, 170, .4);
    }

    #authPage {
      min-height: 100dvh;
      background: var(--gradient);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .auth-container {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      width: min(100%, 450px);
      text-align: center;
      border: 1px solid var(--border-color);
    }

    .auth-container h1 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      margin-bottom: 16px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .field { text-align: left; margin-top: 12px; }

    .field label {
      display: block;
      font-size: .75rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .04em;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 2px solid var(--border-color);
      border-radius: 15px;
      font-size: 1rem;
      background: var(--card-bg);
      color: var(--text-primary);
    }

    input::placeholder { color: var(--text-secondary); }
    input:focus { border-color: var(--accent); outline: none; background: rgba(255, 255, 255, .2); }

    button {
      width: 100%;
      min-height: 44px;
      padding: 10px 14px;
      margin-top: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all .3s;
    }

    button:hover { background: var(--accent-hover); transform: translateY(-1px); }

    #authStatus {
      margin-top: 12px;
      min-height: 20px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.4;
    }

    #authStatus.error { color: var(--error); }

    #chatPage {
      height: 100dvh;
      display: none;
      flex-direction: row;
      background: var(--bg-primary);
      overflow: hidden;
      position: relative;
    }

    #leftPanel {
      width: min(86vw, 360px);
      max-width: 360px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--bg-tertiary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 30;
      transform: translateX(-100%);
      transition: transform .24s ease;
    }

    #chatPage.panel-open #leftPanel { transform: translateX(0); }

    #panelBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    #chatPage.panel-open #panelBackdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .panel-section {
      padding: 12px;
      border-bottom: 1px solid var(--bg-tertiary);
    }

    .profile-login {
      font-weight: 700;
      font-size: clamp(1rem, 2.8vw, 1.125rem);
      margin-bottom: 4px;
    }

    .profile-sub {
      font-size: .75rem;
      color: var(--text-secondary);
    }

    .section-title {
      font-size: .75rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    #searchResults,
    #dialogsList {
      max-height: 28vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .user-item {
      width: 100%;
      min-height: 44px;
      padding: 10px;
      margin: 0;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      text-align: left;
      color: var(--text-primary);
    }

    .user-item:hover { background: rgba(0, 212, 170, .13); }
    .user-item.active { border-color: var(--accent); }

    .user-main { font-weight: 700; font-size: .9rem; }
    .user-sub { margin-top: 4px; color: var(--text-secondary); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .logout {
      background: rgba(255, 0, 0, .25);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 12px;
      margin-top: 0;
    }

    #chatArea {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      width: 100%;
    }

    #chatHeader {
      background: var(--header-gradient);
      padding: 12px;
      font-size: clamp(1rem, 3.5vw, 1.125rem);
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    #presence {
      font-size: 12px;
      color: rgba(255,255,255,.9);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .danger-btn {
      width: auto;
      margin-top: 0;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.2);
      font-size: 12px;
    }

    .menu-btn {
      width: auto;
      min-width: 44px;
      min-height: 44px;
      margin-top: 0;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.2);
      font-size: .9rem;
    }

    .danger-btn:hover {
      background: rgba(255, 0, 0, 0.35);
    }

    .danger-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    #messages {
      flex: 1;
      min-height: 0;
      padding: 12px;
      overflow-y: auto;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .empty {
      margin: auto;
      text-align: center;
      color: var(--text-secondary);
      max-width: 520px;
      line-height: 1.5;
    }

    .message {
      max-width: 88%;
      border-radius: 16px;
      overflow: hidden;
    }

    .message.own {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border-bottom-right-radius: 6px;
      color: white;
    }

    .message.other {
      align-self: flex-start;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 6px;
    }

    .message-content { padding: 10px 12px; }

    .message-header {
      font-weight: 700;
      font-size: .8rem;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .message-text { line-height: 1.45; word-wrap: break-word; }

    .message-time {
      font-size: 11px;
      opacity: .8;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .message-delete {
      width: auto;
      margin-top: 8px;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      font-size: 12px;
    }

    .message-delete:hover {
      background: rgba(255, 0, 0, 0.28);
    }

    #composer {
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: var(--bg-secondary);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid var(--bg-tertiary);
    }

    #messageInput { flex: 1 1 100%; }

    #sendBtn {
      width: 100%;
      margin-top: 0;
      border-radius: 15px;
      flex-shrink: 0;
    }
    img, video {
      max-width: 100%;
      height: auto;
    }

    @media (max-width: 640px) {
      .auth-container {
        border-radius: 18px;
      }

      #chatCode {
        display: none;
      }

      .header-actions {
        flex-wrap: wrap;
        justify-content: flex-end;
      }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      #chatPage {
        flex-direction: row;
      }

      #leftPanel {
        width: min(42vw, 360px);
        position: static;
        transform: none;
      }

      #panelBackdrop,
      #panelToggle {
        display: none;
      }

      #sendBtn {
        width: 150px;
      }

      #messageInput {
        flex: 1 1 auto;
      }
    }

    @media (min-width: 1025px) {
      #chatPage {
        flex-direction: row;
      }

      #leftPanel {
        width: 330px;
        position: static;
        transform: none;
      }

      #panelBackdrop,
      #panelToggle {
        display: none;
      }

      .auth-container {
        padding: 40px;
      }

      #chatHeader {
        padding: 16px 24px;
        align-items: center;
      }

      #composer {
        flex-wrap: nowrap;
        padding: 16px 20px;
      }

      #messageInput {
        flex: 1 1 auto;
      }

      #sendBtn {
        width: 130px;
      }

      .message {
        max-width: 72%;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="Переключить тему">🌙</button>

  <section id="authPage">
    <div class="auth-container">
      <h1>💬 Мессенджер</h1>
      <div class="tabs">
        <button type="button" class="tab active" id="loginTab">Вход</button>
        <button type="button" class="tab" id="registerTab">Регистрация</button>
      </div>

      <form id="authForm" autocomplete="off">
        <div class="field">
          <label for="usernameInput">Логин</label>
          <input id="usernameInput" required minlength="3" maxlength="24" pattern="[A-Za-z0-9_.\-]{3,24}" placeholder="Например: max_user" />
        </div>

        <div class="field">
          <label for="passwordInput">Пароль</label>
          <input id="passwordInput" required type="password" minlength="6" maxlength="64" placeholder="Минимум 6 символов" />
        </div>

        <button id="authSubmit" type="submit">Войти</button>
      </form>

      <div id="authStatus">Готово.</div>
    </div>
  </section>

  <section id="chatPage">
    <div id="panelBackdrop" aria-hidden="true"></div>
    <aside id="leftPanel">
      <div class="panel-section">
        <div class="profile-login" id="meLogin">@unknown</div>
        <div class="profile-sub">Realtime Database session active</div>
      </div>

      <div class="panel-section">
        <div class="section-title">Поиск друзей по логину</div>
        <input id="searchInput" placeholder="Введите логин..." />
      </div>

      <div class="panel-section">
        <div class="section-title">Результаты</div>
        <div id="searchResults"></div>
      </div>

      <div class="panel-section" style="flex:1; min-height: 0; display:flex; flex-direction: column;">
        <div class="section-title">Диалоги</div>
        <div id="dialogsList" style="flex:1;"></div>
      </div>

      <div class="panel-section">
        <button class="logout" id="logoutBtn" type="button">Выйти</button>
      </div>
    </aside>

    <main id="chatArea">
      <header id="chatHeader">
        <div>
          <div id="chatTitle">Выберите друга для диалога</div>
          <div id="presence">Статус: —</div>
        </div>
        <div class="header-actions">
          <button id="panelToggle" class="menu-btn" type="button" aria-label="Открыть меню">Меню</button>
          <div id="chatCode" style="font-size:12px; opacity:.9;">chat: ---</div>
          <button id="deleteChatBtn" class="danger-btn" type="button" disabled>Удалить чат</button>
        </div>
      </header>

      <div id="messages">
        <div class="empty">Найдите друга по логину слева, откройте диалог и начните переписку в реальном времени.</div>
      </div>

      <form id="composer">
        <input id="messageInput" maxlength="1500" placeholder="Напишите сообщение..." />
        <button id="sendBtn" type="submit">Отправить</button>
      </form>
    </main>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    import {
      getDatabase,
      ref,
      get,
      set,
      update,
      push,
      remove,
      query,
      orderByChild,
      startAt,
      endAt,
      limitToLast,
      onValue,
      onDisconnect,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBalx-yReG31BkexcSYkX6CknHh_m_St2M",
      authDomain: "messanger-b98dd.firebaseapp.com",
      databaseURL: "https://messanger-b98dd-default-rtdb.firebaseio.com",
      projectId: "messanger-b98dd",
      storageBucket: "messanger-b98dd.firebasestorage.app",
      messagingSenderId: "389022023604",
      appId: "1:389022023604:web:5e89db01e9b9fa1aa8bce1",
      measurementId: "G-VRV1YXQRP2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    analyticsSupported().then((ok) => { if (ok) getAnalytics(app); }).catch(() => {});

    const LS_THEME = "messenger_theme_v4";
    const LS_SESSION = "messenger_session_v4";

    const $ = (id) => document.getElementById(id);

    let mode = "login";
    let me = null;
    let activePeer = null;
    let activeChatId = null;
    let dialogsUnsub = null;
    let messagesUnsub = null;
    let presenceUnsub = null;
    const mobileMedia = window.matchMedia("(max-width: 640px)");

    function esc(v) {
      return String(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(text, isError = false) {
      const el = $("authStatus");
      el.textContent = text;
      el.className = isError ? "error" : "";
    }

    function toKey(login) {
      return login.trim().toLowerCase();
    }

    function isValidLogin(login) {
      return /^[a-zA-Z0-9_.-]{3,24}$/.test(login);
    }

    function chatIdByUsers(a, b) {
      return [toKey(a), toKey(b)].sort().join("__");
    }

    function formatTime(ts) {
      if (!ts) return "--:--";
      const d = new Date(ts);
      return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    }

    async function hashPassword(raw) {
      const data = new TextEncoder().encode(raw);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash)).map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      $("themeToggle").textContent = theme === "light" ? "🌙" : "☀️";
      localStorage.setItem(LS_THEME, theme);
    }

    function setAuthMode(nextMode) {
      mode = nextMode;
      $("loginTab").classList.toggle("active", mode === "login");
      $("registerTab").classList.toggle("active", mode === "register");
      $("authSubmit").textContent = mode === "login" ? "Войти" : "Зарегистрироваться";
      setStatus(mode === "login" ? "Режим входа." : "Режим регистрации.", false);
    }

    function setPanelOpen(isOpen) {
      $("chatPage").classList.toggle("panel-open", isOpen);
    }

    function renderSearch(users) {
      const root = $("searchResults");
      root.innerHTML = "";

      if (!users.length) {
        root.innerHTML = '<div class="user-item"><div class="user-sub">Ничего не найдено</div></div>';
        return;
      }

      users.forEach((u) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "user-item";
        btn.innerHTML = `<div class="user-main">@${esc(u.username)}</div><div class="user-sub">Открыть диалог</div>`;
        btn.addEventListener("click", () => openDialog(u.username));
        root.appendChild(btn);
      });
    }

    function renderDialogs(dialogs) {
      const root = $("dialogsList");
      root.innerHTML = "";

      if (!dialogs.length) {
        root.innerHTML = '<div class="user-item"><div class="user-sub">Пока нет диалогов</div></div>';
        return;
      }

      dialogs.forEach((d) => {
        const row = document.createElement("div");
        row.className = "user-item";
        row.innerHTML = `
          <div class="user-main">@${esc(d.peer)}</div>
          <div class="user-sub">${esc(d.lastMessage || "Пусто")} · ${formatTime(d.lastAt)}</div>
        `;

        const openBtn = document.createElement("button");
        openBtn.type = "button";
        openBtn.className = `user-item ${activePeer === d.peer ? "active" : ""}`;
        openBtn.style.marginTop = "8px";
        openBtn.textContent = "Открыть";
        openBtn.addEventListener("click", () => openDialog(d.peer));

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "message-delete";
        deleteBtn.textContent = "Удалить чат";
        deleteBtn.addEventListener("click", async (event) => {
          event.stopPropagation();
          await deleteChatWithPeer(d.peer);
        });

        row.appendChild(openBtn);
        row.appendChild(deleteBtn);
        root.appendChild(row);
      });
    }

    function renderMessages(items) {
      const root = $("messages");
      root.innerHTML = "";

      if (!items.length) {
        root.innerHTML = '<div class="empty">Диалог создан. Отправьте первое сообщение.</div>';
        return;
      }

      items.forEach((m) => {
        const own = m.fromKey === me.usernameKey;
        const el = document.createElement("div");
        el.className = `message ${own ? "own" : "other"}`;
        el.innerHTML = `
          <div class="message-content">
            <div class="message-header">
              <span>@${esc(m.from)}</span>
              <span class="message-time">${formatTime(m.createdAt)}</span>
            </div>
            <div class="message-text">${esc(m.text)}</div>
          </div>
        `;

        if (own) {
          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "message-delete";
          removeBtn.textContent = "Удалить сообщение";
          removeBtn.addEventListener("click", () => {
            deleteMessage(m.id).catch(() => {});
          });
          el.querySelector(".message-content").appendChild(removeBtn);
        }

        root.appendChild(el);
      });

      root.scrollTop = root.scrollHeight;
    }

    async function syncChatPreview(chatId, leftUsername, rightUsername) {
      const leftKey = toKey(leftUsername);
      const rightKey = toKey(rightUsername);
      const lastSnap = await get(query(ref(db, `chats/${chatId}/messages`), limitToLast(1)));
      const raw = lastSnap.val() || {};
      const lastMessage = Object.values(raw)[0];

      if (!lastMessage) {
        await update(ref(db), {
          [`userChats/${leftKey}/${chatId}`]: null,
          [`userChats/${rightKey}/${chatId}`]: null
        });
        return;
      }

      const safeText = String(lastMessage.text || "").slice(0, 120);
      const safeDate = Number(lastMessage.createdAt || Date.now());

      await update(ref(db), {
        [`userChats/${leftKey}/${chatId}`]: {
          peer: rightUsername,
          chatId,
          lastMessage: safeText,
          lastAt: safeDate
        },
        [`userChats/${rightKey}/${chatId}`]: {
          peer: leftUsername,
          chatId,
          lastMessage: safeText,
          lastAt: safeDate
        }
      });
    }

    async function register(login, password) {
      const usernameKey = toKey(login);
      const userRef = ref(db, `users/${usernameKey}`);
      const existsSnap = await get(userRef);
      if (existsSnap.exists()) throw new Error("Такой логин уже занят.");

      const passHash = await hashPassword(password);
      await set(userRef, {
        username: login,
        usernameKey,
        passHash,
        createdAt: Date.now(),
        lastSeen: Date.now()
      });

      return { username: login, usernameKey };
    }

    async function login(loginValue, password) {
      const usernameKey = toKey(loginValue);
      const userSnap = await get(ref(db, `users/${usernameKey}`));
      if (!userSnap.exists()) throw new Error("Пользователь не найден.");

      const user = userSnap.val();
      const passHash = await hashPassword(password);
      if (user.passHash !== passHash) throw new Error("Неверный пароль.");

      await update(ref(db, `users/${usernameKey}`), { lastSeen: Date.now() });
      return { username: user.username, usernameKey };
    }

    async function beginSession(user) {
      me = user;
      localStorage.setItem(LS_SESSION, JSON.stringify(user));

      $("meLogin").textContent = `@${me.username}`;
      $("authPage").style.display = "none";
      $("chatPage").style.display = "flex";
      setPanelOpen(false);

      await setOnlinePresence();
      watchDialogs();
    }

    async function setOnlinePresence() {
      const pRef = ref(db, `presence/${me.usernameKey}`);
      await set(pRef, {
        username: me.username,
        online: true,
        lastSeen: serverTimestamp()
      });

      onDisconnect(pRef).update({
        online: false,
        lastSeen: serverTimestamp()
      });
    }

    function watchDialogs() {
      if (dialogsUnsub) dialogsUnsub();

      dialogsUnsub = onValue(ref(db, `userChats/${me.usernameKey}`), (snap) => {
        const rows = Object.values(snap.val() || {}).sort((a, b) => (b.lastAt || 0) - (a.lastAt || 0));
        renderDialogs(rows);
      });
    }

    function watchMessages() {
      if (messagesUnsub) messagesUnsub();

      const q = query(ref(db, `chats/${activeChatId}/messages`), limitToLast(200));
      messagesUnsub = onValue(q, (snap) => {
        const rows = Object.entries(snap.val() || {})
          .map(([id, value]) => ({ id, ...value }))
          .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        renderMessages(rows);
      });
    }

    function watchPresence() {
      if (presenceUnsub) presenceUnsub();

      presenceUnsub = onValue(ref(db, `presence/${toKey(activePeer)}`), (snap) => {
        const online = Boolean(snap.val()?.online);
        $("presence").textContent = `Статус: ${online ? "онлайн" : "оффлайн"}`;
      });
    }

    function openDialog(peerLogin) {
      activePeer = peerLogin;
      activeChatId = chatIdByUsers(me.username, activePeer);

      $("chatTitle").textContent = `Диалог с @${activePeer}`;
      $("chatCode").textContent = `chat: ${activeChatId}`;
      $("deleteChatBtn").disabled = false;

      watchPresence();
      watchMessages();
      watchDialogs();
      if (mobileMedia.matches) setPanelOpen(false);
    }

    async function sendMessage(text) {
      if (!activePeer || !activeChatId) return;
      const clean = text.trim();
      if (!clean) return;

      const now = Date.now();
      const payload = {
        from: me.username,
        fromKey: me.usernameKey,
        to: activePeer,
        text: clean,
        createdAt: now
      };

      await push(ref(db, `chats/${activeChatId}/messages`), payload);

      const myDialog = {
        peer: activePeer,
        chatId: activeChatId,
        lastMessage: clean.slice(0, 120),
        lastAt: now
      };

      const peerDialog = {
        peer: me.username,
        chatId: activeChatId,
        lastMessage: clean.slice(0, 120),
        lastAt: now
      };

      await update(ref(db), {
        [`userChats/${me.usernameKey}/${activeChatId}`]: myDialog,
        [`userChats/${toKey(activePeer)}/${activeChatId}`]: peerDialog,
        [`users/${me.usernameKey}/lastSeen`]: now
      });
    }

    async function deleteMessage(messageId) {
      if (!activeChatId || !activePeer || !messageId) return;

      const messageRef = ref(db, `chats/${activeChatId}/messages/${messageId}`);
      const snap = await get(messageRef);
      if (!snap.exists()) return;

      const message = snap.val();
      if (message.fromKey !== me.usernameKey) {
        alert("Можно удалять только свои сообщения.");
        return;
      }

      await remove(messageRef);
      await syncChatPreview(activeChatId, me.username, activePeer);
    }

    async function deleteChatWithPeer(peerUsername = activePeer) {
      if (!me || !peerUsername) return;
      const chatId = chatIdByUsers(me.username, peerUsername);
      const peerKey = toKey(peerUsername);

      const approved = window.confirm(`Удалить чат с @${peerUsername}? Это действие нельзя отменить.`);
      if (!approved) return;

      await update(ref(db), {
        [`chats/${chatId}`]: null,
        [`userChats/${me.usernameKey}/${chatId}`]: null,
        [`userChats/${peerKey}/${chatId}`]: null
      });

      if (activeChatId === chatId) {
        if (messagesUnsub) messagesUnsub();
        if (presenceUnsub) presenceUnsub();
        messagesUnsub = null;
        presenceUnsub = null;
        activePeer = null;
        activeChatId = null;
        $("chatTitle").textContent = "Выберите друга для диалога";
        $("presence").textContent = "Статус: —";
        $("chatCode").textContent = "chat: ---";
        $("deleteChatBtn").disabled = true;
        $("messages").innerHTML = '<div class="empty">Чат удалён. Выберите пользователя для нового диалога.</div>';
      }
    }

    async function searchUsers(prefix) {
      const term = toKey(prefix);
      if (term.length < 2) {
        renderSearch([]);
        return;
      }

      const mapRows = (raw) => Object.values(raw || {})
        .filter((u) => u.usernameKey !== me.usernameKey)
        .filter((u) => String(u.usernameKey || "").startsWith(term))
        .slice(0, 30)
        .map((u) => ({ username: u.username }));

      try {
        const q = query(
          ref(db, "users"),
          orderByChild("usernameKey"),
          startAt(term),
          endAt(`${term}\uf8ff`)
        );

        const snap = await get(q);
        renderSearch(mapRows(snap.val()));
      } catch (err) {
        const message = String(err?.message || "");
        const needsIndex = message.includes("Index not defined") || message.includes(".indexOn");

        if (needsIndex) {
          try {
            const fullSnap = await get(ref(db, "users"));
            renderSearch(mapRows(fullSnap.val()));
            return;
          } catch (fallbackErr) {
            console.error("Search fallback error:", fallbackErr);
          }
        }

        console.error("Search error:", err);
        renderSearch([]);
        $("searchResults").innerHTML = '<div class="user-item"><div class="user-sub">Ошибка поиска. Поверьте rules/index в Firebase.</div></div>';
      }
    }

    async function logout() {
      if (me?.usernameKey) {
        await update(ref(db, `presence/${me.usernameKey}`), {
          online: false,
          lastSeen: serverTimestamp()
        });
      }

      if (dialogsUnsub) dialogsUnsub();
      if (messagesUnsub) messagesUnsub();
      if (presenceUnsub) presenceUnsub();
      dialogsUnsub = null;
      messagesUnsub = null;
      presenceUnsub = null;

      me = null;
      activePeer = null;
      activeChatId = null;
      localStorage.removeItem(LS_SESSION);

      $("chatPage").style.display = "none";
      $("authPage").style.display = "flex";
      $("chatTitle").textContent = "Выберите друга для диалога";
      $("presence").textContent = "Статус: —";
      $("chatCode").textContent = "chat: ---";
      $("deleteChatBtn").disabled = true;
      $("messages").innerHTML = '<div class="empty">Найдите друга по логину слева, откройте диалог и начните переписку в реальном времени.</div>';
      $("dialogsList").innerHTML = "";
      $("searchResults").innerHTML = "";
      $("messageInput").value = "";
      setPanelOpen(false);
    }

    async function restoreSession() {
      const raw = localStorage.getItem(LS_SESSION);
      if (!raw) return;

      try {
        const session = JSON.parse(raw);
        if (!session?.usernameKey) return;

        const snap = await get(ref(db, `users/${session.usernameKey}`));
        if (!snap.exists()) {
          localStorage.removeItem(LS_SESSION);
          return;
        }

        await beginSession({
          username: snap.val().username,
          usernameKey: session.usernameKey
        });
      } catch {
        localStorage.removeItem(LS_SESSION);
      }
    }

    function bindEvents() {
      $("loginTab").addEventListener("click", () => setAuthMode("login"));
      $("registerTab").addEventListener("click", () => setAuthMode("register"));

      $("themeToggle").addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme") || "dark";
        setTheme(current === "light" ? "dark" : "light");
      });

      $("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const loginValue = $("usernameInput").value.trim();
        const password = $("passwordInput").value;

        if (!isValidLogin(loginValue)) {
          setStatus("Логин: 3-24 символа, только A-Z, 0-9, _, ., -", true);
          return;
        }

        if (password.length < 6) {
          setStatus("Пароль должен быть не короче 6 символов.", true);
          return;
        }

        try {
          setStatus(mode === "login" ? "Выполняется вход..." : "Выполняется регистрация...");
          const user = mode === "login"
            ? await login(loginValue, password)
            : await register(loginValue, password);

          setStatus("Успешно.");
          await beginSession(user);
        } catch (err) {
          setStatus(err?.message || "Ошибка авторизации.", true);
        }
      });

      let timer = null;
      $("searchInput").addEventListener("input", () => {
        clearTimeout(timer);
        const value = $("searchInput").value;
        timer = setTimeout(() => {
          if (!me) return;
          searchUsers(value).catch(() => renderSearch([]));
        }, 220);
      });

      $("composer").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!me || !activeChatId) return;

        const input = $("messageInput");
        const text = input.value;
        input.value = "";

        try {
          await sendMessage(text);
        } catch {
          input.value = text;
        }
      });

      $("logoutBtn").addEventListener("click", () => {
        logout().catch(() => {});
      });

      $("deleteChatBtn").addEventListener("click", () => {
        deleteChatWithPeer().catch(() => {});
      });

      $("panelToggle").addEventListener("click", () => {
        const isOpen = $("chatPage").classList.contains("panel-open");
        setPanelOpen(!isOpen);
      });

      $("panelBackdrop").addEventListener("click", () => {
        setPanelOpen(false);
      });

      mobileMedia.addEventListener("change", (event) => {
        if (!event.matches) setPanelOpen(false);
      });
    }

    function initTheme() {
      const saved = localStorage.getItem(LS_THEME) || "dark";
      setTheme(saved);
    }

    function init() {
      initTheme();
      bindEvents();
      restoreSession().catch(() => {});
    }

    init();
  </script>
</body>
</html>
