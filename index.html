<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мессенджер</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f7f6f3;
      --surface: #f9f9f8;
      --text: #111111;
      --muted: #787774;
      --border: #eaeaea;
      --accent: #dfeee5;
      --accent-strong: #111111;
      --tap: 46px;
      --radius-sm: 8px;
      --radius: 12px;
      --transition: 180ms ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Pro Text", "Geist", "Helvetica Neue", Arial, sans-serif;
    }

    body { overflow: hidden; }

    button, input, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), opacity var(--transition);
    }

    button:hover { background: var(--bg-soft); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    #authPage {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg-soft);
    }

    .auth-card {
      width: min(100%, 420px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      padding: 28px;
    }

    .auth-title {
      font-size: 1.5rem;
      line-height: 1.2;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      min-height: var(--tap);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      font-weight: 500;
    }

    .tab.active {
      background: var(--bg-soft);
      border-color: #d6d6d6;
    }

    .field { margin-top: 12px; }

    .field label {
      display: block;
      color: var(--muted);
      font-size: .76rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input {
      width: 100%;
      min-height: var(--tap);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      padding: 11px 12px;
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    .input::placeholder { color: var(--muted); }
    .input:focus {
      border-color: #d5d5d5;
      background: var(--surface);
    }

    .primary-btn {
      width: 100%;
      min-height: var(--tap);
      margin-top: 14px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      border-radius: 6px;
      font-weight: 500;
    }

    .primary-btn:hover { background: #202020; }

    #authStatus {
      min-height: 20px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    #authStatus.error { color: #b3261e; }

    #chatPage {
      display: none;
      height: 100dvh;
      grid-template-columns: minmax(270px, 340px) 1fr;
      background: var(--bg);
    }

    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }

    .sidebar-head,
    .sidebar-search,
    .sidebar-actions {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .profile-login { font-size: 1.05rem; font-weight: 600; }
    .profile-sub { font-size: .8rem; color: var(--muted); margin-top: 3px; }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-item {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      min-height: var(--tap);
      border: 0;
      border-radius: 10px;
      background: transparent;
      border-left: 2px solid transparent;
    }

    .chat-item:hover { background: var(--surface); }

    .chat-item.active {
      background: var(--bg-soft);
      border-left-color: #b6d8c5;
    }

    .chat-main {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }

    .chat-name { font-weight: 500; font-size: .95rem; }
    .chat-time { font-size: .73rem; color: var(--muted); white-space: nowrap; }
    .chat-preview {
      margin-top: 4px;
      font-size: .82rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ghost {
      color: var(--muted);
      font-size: .84rem;
      padding: 10px 12px;
    }

    .sidebar-actions .danger,
    .danger {
      min-height: var(--tap);
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg);
      color: #6b1a16;
    }

    .chat-view {
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .chat-header {
      min-height: 74px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      gap: 12px;
      background: var(--bg);
    }

    .chat-title {
      font-size: 1.22rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .chat-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: .82rem;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .menu-btn,
    .subtle-btn {
      min-height: var(--tap);
      padding: 8px 12px;
      width: auto;
      background: var(--bg);
    }

    #chatCode { color: var(--muted); font-size: .76rem; }

    .message-viewport {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 26px 22px;
      background: var(--bg);
    }

    #messages {
      width: min(100%, 640px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      margin: auto;
      max-width: 520px;
      padding: 40px 20px;
    }

    .message {
      animation: fadeInUp 180ms ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message.outgoing { align-items: flex-end; }

    .message-block {
      max-width: min(90%, 560px);
      width: fit-content;
      padding: 0;
    }

    .message-head {
      font-size: .84rem;
      font-weight: 500;
      color: var(--muted);
      display: flex;
      gap: 8px;
      align-items: baseline;
      justify-content: space-between;
    }

    .message-text {
      margin-top: 6px;
      font-size: 0.98rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .message-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .delete-msg {
      min-height: 34px;
      font-size: .78rem;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--bg);
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: var(--bg);
    }

    .composer-inner {
      width: min(100%, 680px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    #messageInput {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: var(--surface);
      line-height: 1.55;
      font-size: 0.97rem;
    }

    #sendBtn {
      min-width: 112px;
      min-height: 44px;
      border-radius: 6px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      padding: 0 14px;
      align-self: stretch;
    }

    #sendBtn:hover { background: #202020; }

    .mobile-back { display: none; }

    @media (max-width: 860px) {
      #chatPage {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
      }

      .chat-view,
      .sidebar {
        position: absolute;
        inset: 0;
        background: var(--bg);
      }

      #chatPage.state-list .chat-view { display: none; }
      #chatPage.state-chat .sidebar { display: none; }

      .mobile-back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
      }

      .chat-header {
        min-height: 68px;
        padding: 10px 12px;
      }

      .header-controls {
        gap: 6px;
      }

      #chatCode { display: none; }

      .composer-inner {
        grid-template-columns: 1fr;
      }

      #sendBtn {
        min-height: 46px;
        width: 100%;
      }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <section id="authPage">
    <div class="auth-card">
      <h1 class="auth-title">Мессенджер</h1>
      <div class="tabs">
        <button type="button" class="tab active" id="loginTab">Вход</button>
        <button type="button" class="tab" id="registerTab">Регистрация</button>
      </div>

      <form id="authForm" autocomplete="off">
        <div class="field">
          <label for="usernameInput">Логин</label>
          <input class="input" id="usernameInput" required minlength="3" maxlength="24" pattern="[A-Za-z0-9_.\-]{3,24}" placeholder="Например: max_user" />
        </div>

        <div class="field">
          <label for="passwordInput">Пароль</label>
          <input class="input" id="passwordInput" required type="password" minlength="6" maxlength="64" placeholder="Минимум 6 символов" />
        </div>

        <button id="authSubmit" class="primary-btn" type="submit">Войти</button>
      </form>

      <div id="authStatus">Готово.</div>
    </div>
  </section>

  <section id="chatPage" class="state-list">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="profile-login" id="meLogin">@unknown</div>
        <div class="profile-sub">Focused communication mode</div>
      </div>

      <div class="sidebar-search">
        <input class="input" id="searchInput" placeholder="Поиск по логину" />
      </div>

      <div id="searchResults" class="list"></div>
      <div id="dialogsList" class="list"></div>

      <div class="sidebar-actions">
        <button class="danger" id="logoutBtn" type="button">Выйти</button>
      </div>
    </aside>

    <main class="chat-view">
      <header class="chat-header">
        <div class="header-controls">
          <button id="mobileBack" class="subtle-btn mobile-back" type="button" aria-label="Назад">←</button>
          <div>
            <div class="chat-title" id="chatTitle">Выберите диалог</div>
            <div class="chat-meta" id="presence">Статус: —</div>
          </div>
        </div>
        <div class="header-controls">
          <div id="chatCode">chat: ---</div>
          <button id="deleteChatBtn" class="subtle-btn" type="button" disabled>Удалить чат</button>
        </div>
      </header>

      <div class="message-viewport" id="messageViewport">
        <div id="messages">
          <div class="empty">Найдите пользователя по логину, откройте диалог и начните переписку.</div>
        </div>
      </div>

      <form id="composer" class="composer">
        <div class="composer-inner">
          <textarea id="messageInput" maxlength="1500" placeholder="Write a message..."></textarea>
          <button id="sendBtn" type="submit">Отправить</button>
        </div>
      </form>
    </main>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      set,
      update,
      push,
      remove,
      query,
      orderByChild,
      startAt,
      endAt,
      limitToLast,
      onValue,
      onDisconnect,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBalx-yReG31BkexcSYkX6CknHh_m_St2M",
      authDomain: "messanger-b98dd.firebaseapp.com",
      databaseURL: "https://messanger-b98dd-default-rtdb.firebaseio.com",
      projectId: "messanger-b98dd",
      storageBucket: "messanger-b98dd.firebasestorage.app",
      messagingSenderId: "389022023604",
      appId: "1:389022023604:web:5e89db01e9b9fa1aa8bce1",
      measurementId: "G-VRV1YXQRP2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const LS_SESSION = "messenger_session_v4";
    const $ = (id) => document.getElementById(id);

    const state = {
      mode: "login",
      currentUser: null,
      activeChat: null,
      selectedMessageId: null,
      groups: [],
      dialogs: [],
      hiddenMap: {},
      messageNodes: new Map()
    };

    const unsub = { dialogs: null, messages: null, presence: null };
    let isAuthSubmitting = false;
    let isSendingMessage = false;

    const actionPanel = createActionPanel();

    function esc(v) {
      return String(v).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function toKey(login) {
      return String(login || "").trim().toLowerCase();
    }

    function isValidLogin(login) {
      return /^[a-zA-Z0-9_.-]{3,24}$/.test(login);
    }

    function chatIdByUsers(a, b) {
      return [toKey(a), toKey(b)].sort().join("__");
    }

    function formatTime(ts) {
      return ts ? new Date(ts).toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" }) : "--:--";
    }

    function activeChatKey(chat = state.activeChat) {
      if (!chat) return "";
      return chat.type === "group" ? `g_${chat.groupId}` : `p_${chat.chatId}`;
    }

    function messagePath(chat = state.activeChat) {
      if (!chat) return "";
      return chat.type === "group" ? `groups/${chat.groupId}/messages` : `messages/${chat.chatId}`;
    }

    async function hashPassword(raw) {
      const data = new TextEncoder().encode(raw);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash)).map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    async function fileToSquareBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve("");
        const reader = new FileReader();
        reader.onload = () => {
          const image = new Image();
          image.onload = () => {
            const size = Math.min(image.width, image.height);
            const sx = Math.floor((image.width - size) / 2);
            const sy = Math.floor((image.height - size) / 2);
            const canvas = document.createElement("canvas");
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(image, sx, sy, size, size, 0, 0, 256, 256);
            resolve(canvas.toDataURL("image/jpeg", 0.85));
          };
          image.onerror = () => reject(new Error("Ошибка чтения изображения"));
          image.src = reader.result;
        };
        reader.onerror = () => reject(new Error("Ошибка чтения файла"));
        reader.readAsDataURL(file);
      });
    }

    function setStatus(text, isError = false) {
      const el = $("authStatus");
      el.textContent = text;
      el.className = isError ? "error" : "";
    }

    function clearAuthArtifacts() {
      localStorage.removeItem(LS_SESSION);
      sessionStorage.removeItem(LS_SESSION);
    }

    function setAuthLoading(loading) {
      isAuthSubmitting = loading;
      ["authSubmit", "loginTab", "registerTab", "usernameInput", "passwordInput"].forEach((id) => { $(id).disabled = loading; });
      $("authSubmit").textContent = loading ? (state.mode === "login" ? "Вход..." : "Регистрация...") : (state.mode === "login" ? "Войти" : "Зарегистрироваться");
    }

    function setAuthMode(nextMode) {
      if (isAuthSubmitting) return;
      state.mode = nextMode;
      $("loginTab").classList.toggle("active", state.mode === "login");
      $("registerTab").classList.toggle("active", state.mode === "register");
      $("authSubmit").textContent = state.mode === "login" ? "Войти" : "Зарегистрироваться";
      setStatus(state.mode === "login" ? "Режим входа." : "Режим регистрации.");
    }

    function guardAuthAccess() {
      if (state.currentUser) return true;
      $("chatPage").style.display = "none";
      $("authPage").style.display = "grid";
      return false;
    }

    function setMobileState(value) {
      const root = $("chatPage");
      root.classList.remove("state-list", "state-chat");
      root.classList.add(value);
    }

    function openProfile(user) {
      if (!user) return;
      const info = [
        `@${user.username}`,
        `Имя: ${user.displayName || "—"}`,
        `Статус: ${user.status || "—"}`,
        `lastSeen: ${user.lastSeen ? new Date(user.lastSeen).toLocaleString("ru-RU") : "—"}`
      ].join("\n");
      alert(info);
    }

    async function editMyProfile() {
      if (!guardAuthAccess()) return;
      const current = state.currentUser;
      const displayName = prompt("Ваше имя", current.displayName || current.username);
      if (displayName === null) return;
      const status = prompt("Ваш статус", current.status || "");
      if (status === null) return;
      const avatarUrl = prompt("Avatar URL (опционально)", current.avatarUrl || "");
      if (avatarUrl === null) return;

      const patch = {
        displayName: displayName.trim().slice(0, 64) || current.username,
        status: status.trim().slice(0, 120),
        avatarUrl: avatarUrl.trim(),
        lastSeen: Date.now()
      };
      await update(ref(db, `users/${current.usernameKey}`), patch);
      state.currentUser = { ...state.currentUser, ...patch };
      localStorage.setItem(LS_SESSION, JSON.stringify(state.currentUser));
      $("meLogin").textContent = `@${state.currentUser.username}`;
      $("presence").textContent = `Статус: ${state.currentUser.status || "—"}`;
    }

    function createActionPanel() {
      const panel = document.createElement("div");
      panel.style.position = "fixed";
      panel.style.right = "16px";
      panel.style.bottom = "16px";
      panel.style.display = "none";
      panel.style.gap = "8px";
      panel.style.zIndex = "1000";

      const forward = document.createElement("button");
      forward.className = "subtle-btn";
      forward.textContent = "Переслать";
      forward.addEventListener("click", () => forwardSelectedMessage().catch(() => {}));

      const del = document.createElement("button");
      del.className = "subtle-btn";
      del.textContent = "Удалить";
      del.addEventListener("click", () => deleteSelectedMessage().catch(() => {}));

      panel.append(forward, del);
      document.body.appendChild(panel);
      return panel;
    }

    function setActionPanelVisible(visible) {
      actionPanel.style.display = visible ? "flex" : "none";
    }

    function messageSelectHandler(messageId) {
      state.selectedMessageId = state.selectedMessageId === messageId ? null : messageId;
      highlightSelectedMessage();
      setActionPanelVisible(Boolean(state.selectedMessageId));
    }

    function highlightSelectedMessage() {
      state.messageNodes.forEach((node, id) => {
        node.style.background = id === state.selectedMessageId ? "var(--bg-soft)" : "transparent";
        node.style.borderRadius = "8px";
        node.style.padding = "6px";
      });
    }

    function renderSearch(items) {
      const root = $("searchResults");
      root.innerHTML = "";
      if (!items.length) {
        root.innerHTML = '<div class="ghost">Пользователи/группы не найдены</div>';
        return;
      }

      items.forEach((entry) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chat-item";
        if (entry.type === "group") {
          btn.innerHTML = `<div class="chat-main"><span class="chat-name">#${esc(entry.name)}</span><span class="chat-time">group</span></div><div class="chat-preview">${esc(entry.description || "Групповой чат")}</div>`;
          btn.addEventListener("click", () => openGroupDialog(entry));
        } else {
          btn.innerHTML = `<div class="chat-main"><span class="chat-name">@${esc(entry.username)}</span><span class="chat-time">${esc(entry.displayName || "user")}</span></div><div class="chat-preview">${esc(entry.status || "Открыть диалог")}</div>`;
          btn.addEventListener("click", () => openPrivateDialog(entry));
        }
        root.appendChild(btn);
      });
    }

    function renderDialogs(dialogs) {
      const root = $("dialogsList");
      root.innerHTML = "";
      if (!dialogs.length) {
        root.innerHTML = '<div class="ghost">Пока нет диалогов</div>';
        return;
      }

      dialogs.forEach((d) => {
        const item = document.createElement("button");
        item.type = "button";
        const activeId = state.activeChat?.type === "group" ? state.activeChat.groupId : state.activeChat?.chatId;
        item.className = `chat-item ${activeId === (d.groupId || d.chatId) ? "active" : ""}`;
        const name = d.type === "group" ? `#${d.name}` : `@${d.peer}`;
        item.innerHTML = `<div class="chat-main"><span class="chat-name">${esc(name)}</span><span class="chat-time">${formatTime(d.lastAt)}</span></div><div class="chat-preview">${esc(d.lastMessage || "Пусто")}</div>`;
        item.addEventListener("click", () => d.type === "group" ? openGroupDialog(d) : openPrivateDialog(d));
        root.appendChild(item);
      });
    }

    function buildMessageNode(m) {
      const own = m.fromKey === state.currentUser.usernameKey;
      const el = document.createElement("article");
      el.className = `message ${own ? "outgoing" : "incoming"}`;
      const forwarded = m.forwarded ? `<div class="chat-preview">Переслано от @${esc(m.originalSender || "unknown")}</div>` : "";
      el.innerHTML = `<div class="message-block"><div class="message-head"><span>${esc(m.fromName || `@${m.from}`)}</span><time>${formatTime(m.createdAt)}</time></div>${forwarded}<div class="message-text">${esc(m.text)}</div></div>`;
      el.addEventListener("click", (event) => {
        event.stopPropagation();
        messageSelectHandler(m.id);
      });
      return el;
    }

    function renderMessages(items) {
      const root = $("messages");
      if (!items.length) {
        root.innerHTML = '<div class="empty">Диалог открыт. Напишите первое сообщение.</div>';
        state.messageNodes.clear();
        return;
      }

      const existingIds = new Set();
      const frag = document.createDocumentFragment();

      items.forEach((m) => {
        if (state.hiddenMap[m.id]) return;
        existingIds.add(m.id);
        let node = state.messageNodes.get(m.id);
        if (!node) {
          node = buildMessageNode(m);
          state.messageNodes.set(m.id, node);
        }
        frag.appendChild(node);
      });

      state.messageNodes.forEach((node, id) => {
        if (!existingIds.has(id)) state.messageNodes.delete(id);
      });

      root.innerHTML = "";
      root.appendChild(frag);
      highlightSelectedMessage();
      const viewport = $("messageViewport");
      viewport.scrollTop = viewport.scrollHeight;
    }

    async function register(login, password) {
      const usernameKey = toKey(login);
      const userRef = ref(db, `users/${usernameKey}`);
      const existsSnap = await get(userRef);
      if (existsSnap.exists()) throw new Error("Такой логин уже занят.");
      const passHash = await hashPassword(password);

      const displayName = prompt("Ваше имя", login) || login;
      const status = prompt("Ваш статус", "") || "";
      const avatarUrl = prompt("Avatar URL (опционально)", "") || "";

      await set(userRef, {
        username: login,
        usernameKey,
        displayName: displayName.trim().slice(0, 64) || login,
        avatarUrl: avatarUrl.trim(),
        status: status.trim().slice(0, 120),
        passHash,
        createdAt: Date.now(),
        lastSeen: Date.now()
      });

      return {
        username: login,
        usernameKey,
        displayName: displayName.trim().slice(0, 64) || login,
        avatarUrl: avatarUrl.trim(),
        status: status.trim().slice(0, 120)
      };
    }

    async function login(loginValue, password) {
      const usernameKey = toKey(loginValue);
      const userSnap = await get(ref(db, `users/${usernameKey}`));
      if (!userSnap.exists()) throw new Error("Пользователь не найден.");

      const user = userSnap.val();
      const passHash = await hashPassword(password);
      if (user.passHash !== passHash) throw new Error("Неверный пароль.");

      await update(ref(db, `users/${usernameKey}`), { lastSeen: Date.now() });
      return user;
    }

    async function beginSession(user) {
      state.currentUser = user;
      localStorage.setItem(LS_SESSION, JSON.stringify(user));
      $("meLogin").textContent = `@${user.username}`;
      $("authPage").style.display = "none";
      $("chatPage").style.display = "grid";
      setMobileState("state-list");
      await setOnlinePresence();
      watchDialogs();
    }

    async function setOnlinePresence() {
      const pRef = ref(db, `presence/${state.currentUser.usernameKey}`);
      await set(pRef, {
        username: state.currentUser.username,
        displayName: state.currentUser.displayName || state.currentUser.username,
        status: state.currentUser.status || "",
        avatarUrl: state.currentUser.avatarUrl || "",
        online: true,
        lastSeen: serverTimestamp()
      });
      onDisconnect(pRef).update({ online: false, lastSeen: serverTimestamp() });
    }

    function watchDialogs() {
      if (unsub.dialogs) unsub.dialogs();
      unsub.dialogs = onValue(ref(db, `userChats/${state.currentUser.usernameKey}`), (snap) => {
        state.dialogs = Object.values(snap.val() || {})
          .filter((x) => !x.hidden)
          .sort((a, b) => (b.lastAt || 0) - (a.lastAt || 0));
        renderDialogs(state.dialogs);
      });
    }

    function watchMessages() {
      if (unsub.messages) unsub.messages();
      state.messageNodes.clear();
      const q = query(ref(db, messagePath()), limitToLast(200));
      unsub.messages = onValue(q, (snap) => {
        const rows = Object.entries(snap.val() || {})
          .map(([id, value]) => ({ id, ...value }))
          .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
        renderMessages(rows);
      });
    }

    function watchPresence() {
      if (unsub.presence) unsub.presence();
      if (!state.activeChat || state.activeChat.type !== "private") {
        $("presence").textContent = state.activeChat?.type === "group" ? "Статус: групповой чат" : "Статус: —";
        return;
      }
      unsub.presence = onValue(ref(db, `presence/${toKey(state.activeChat.peer)}`), (snap) => {
        const online = Boolean(snap.val()?.online);
        $("presence").textContent = `Статус: ${online ? "онлайн" : "оффлайн"}`;
      });
    }

    async function openPrivateDialog(user) {
      if (!guardAuthAccess()) return;
      const peer = user.peer || user.username;
      state.activeChat = {
        type: "private",
        peer,
        chatId: chatIdByUsers(state.currentUser.username, peer)
      };
      state.selectedMessageId = null;
      setActionPanelVisible(false);
      state.hiddenMap = (await get(ref(db, `hiddenMessages/${state.currentUser.usernameKey}/${activeChatKey()}`))).val() || {};
      $("chatTitle").textContent = `Диалог с @${peer}`;
      $("chatCode").textContent = `chat: ${state.activeChat.chatId}`;
      $("deleteChatBtn").disabled = false;
      watchPresence();
      watchMessages();
      if (window.matchMedia("(max-width: 860px)").matches) setMobileState("state-chat");
    }

    async function openGroupDialog(group) {
      if (!guardAuthAccess()) return;
      state.activeChat = {
        type: "group",
        groupId: group.groupId,
        name: group.name
      };
      state.selectedMessageId = null;
      setActionPanelVisible(false);
      state.hiddenMap = (await get(ref(db, `hiddenMessages/${state.currentUser.usernameKey}/${activeChatKey()}`))).val() || {};
      $("chatTitle").textContent = `#${group.name}`;
      $("chatCode").textContent = `group: ${group.groupId}`;
      $("deleteChatBtn").disabled = false;
      watchPresence();
      watchMessages();
      if (window.matchMedia("(max-width: 860px)").matches) setMobileState("state-chat");
    }

    async function sendMessage(text, forwarded = false, originalSender = "") {
      if (!guardAuthAccess() || !state.activeChat) return;
      const clean = text.trim();
      if (!clean) return;

      const now = Date.now();
      const payload = {
        text: clean,
        from: state.currentUser.username,
        fromKey: state.currentUser.usernameKey,
        fromName: state.currentUser.displayName || state.currentUser.username,
        createdAt: now,
        forwarded,
        originalSender
      };
      await push(ref(db, messagePath()), payload);

      if (state.activeChat.type === "private") {
        const chatId = state.activeChat.chatId;
        const peer = state.activeChat.peer;
        await update(ref(db), {
          [`userChats/${state.currentUser.usernameKey}/${chatId}`]: { type: "private", peer, chatId, lastMessage: clean.slice(0, 120), lastAt: now },
          [`userChats/${toKey(peer)}/${chatId}`]: { type: "private", peer: state.currentUser.username, chatId, lastMessage: clean.slice(0, 120), lastAt: now },
          [`users/${state.currentUser.usernameKey}/lastSeen`]: now
        });
      } else {
        const groupId = state.activeChat.groupId;
        const members = (await get(ref(db, `groups/${groupId}/members`))).val() || {};
        const batch = {};
        Object.keys(members).forEach((uid) => {
          batch[`userChats/${uid}/${groupId}`] = {
            type: "group",
            groupId,
            name: state.activeChat.name,
            lastMessage: clean.slice(0, 120),
            lastAt: now
          };
        });
        await update(ref(db), batch);
      }
    }

    async function deleteSelectedMessage() {
      if (!state.selectedMessageId || !state.activeChat) return;
      const msgSnap = await get(ref(db, `${messagePath()}/${state.selectedMessageId}`));
      if (!msgSnap.exists()) return;
      const message = msgSnap.val();

      if (message.fromKey === state.currentUser.usernameKey) {
        const mode = prompt("1 - удалить у себя, 2 - удалить у всех", "1");
        if (mode === "2") {
          await remove(ref(db, `${messagePath()}/${state.selectedMessageId}`));
        } else {
          await update(ref(db), { [`hiddenMessages/${state.currentUser.usernameKey}/${activeChatKey()}/${state.selectedMessageId}`]: true });
        }
      } else {
        await update(ref(db), { [`hiddenMessages/${state.currentUser.usernameKey}/${activeChatKey()}/${state.selectedMessageId}`]: true });
      }

      state.selectedMessageId = null;
      setActionPanelVisible(false);
    }

    async function forwardSelectedMessage() {
      if (!state.selectedMessageId || !state.activeChat) return;
      const msgSnap = await get(ref(db, `${messagePath()}/${state.selectedMessageId}`));
      if (!msgSnap.exists()) return;
      const msg = msgSnap.val();
      const targets = state.dialogs.filter((d) => (d.chatId || d.groupId) !== (state.activeChat.chatId || state.activeChat.groupId));

      if (!targets.length) {
        alert("Нет доступных чатов для пересылки.");
        return;
      }

      const menu = targets.map((t, i) => `${i + 1}. ${t.type === "group" ? `#${t.name}` : `@${t.peer}`}`).join("\n");
      const index = Number(prompt(`Куда переслать?\n${menu}`, "1")) - 1;
      if (!Number.isInteger(index) || index < 0 || index >= targets.length) return;

      const target = targets[index];
      if (target.type === "group") {
        await openGroupDialog(target);
      } else {
        await openPrivateDialog(target);
      }
      await sendMessage(msg.text, true, msg.fromName || msg.from);
    }

    async function deleteChatWithActive() {
      if (!state.activeChat || !guardAuthAccess()) return;
      const approved = confirm("Скрыть чат только для вас?");
      if (!approved) return;
      const key = state.activeChat.type === "group" ? state.activeChat.groupId : state.activeChat.chatId;
      await update(ref(db, `userChats/${state.currentUser.usernameKey}/${key}`), { hidden: true });
      state.activeChat = null;
      state.selectedMessageId = null;
      $("chatTitle").textContent = "Выберите диалог";
      $("presence").textContent = "Статус: —";
      $("chatCode").textContent = "chat: ---";
      $("deleteChatBtn").disabled = true;
      $("messages").innerHTML = '<div class="empty">Чат скрыт. Выберите другой диалог.</div>';
      setActionPanelVisible(false);
    }

    async function searchAll(prefix) {
      if (!guardAuthAccess()) return;
      const term = toKey(prefix);
      if (term.length < 2) {
        renderSearch([]);
        return;
      }

      const usersQuery = query(ref(db, "users"), orderByChild("usernameKey"), startAt(term), endAt(`${term}\uf8ff`));
      const usersSnap = await get(usersQuery);
      const users = Object.values(usersSnap.val() || {})
        .filter((u) => u.usernameKey !== state.currentUser.usernameKey)
        .slice(0, 20)
        .map((u) => ({ ...u, type: "user" }));

      const groupsSnap = await get(ref(db, "groups"));
      const groups = Object.entries(groupsSnap.val() || {})
        .map(([groupId, value]) => ({ groupId, ...value, type: "group" }))
        .filter((g) => g.members?.[state.currentUser.usernameKey])
        .filter((g) => toKey(g.name || "").startsWith(term))
        .slice(0, 20);

      renderSearch([...users, ...groups]);
    }

    async function createGroupPrompt() {
      if (!guardAuthAccess()) return;
      const name = prompt("Название группы");
      if (!name) return;
      const description = prompt("Описание", "") || "";
      const avatarUrl = prompt("Avatar URL (опционально)", "") || "";
      const membersInput = prompt("Участники (логины через запятую)", "") || "";
      const usernames = membersInput.split(",").map((x) => toKey(x)).filter(Boolean);

      const members = { [state.currentUser.usernameKey]: true };
      for (const usernameKey of usernames) {
        const userSnap = await get(ref(db, `users/${usernameKey}`));
        if (userSnap.exists()) members[usernameKey] = true;
      }

      const groupRef = push(ref(db, "groups"));
      const groupId = groupRef.key;
      const payload = {
        name: name.trim().slice(0, 80),
        nameKey: toKey(name),
        description: description.trim().slice(0, 160),
        avatarUrl: avatarUrl.trim(),
        creatorId: state.currentUser.usernameKey,
        members,
        createdAt: Date.now()
      };
      await set(ref(db, `groups/${groupId}`), payload);

      const now = Date.now();
      const preview = {
        type: "group",
        groupId,
        name: payload.name,
        description: payload.description,
        lastMessage: "Группа создана",
        lastAt: now
      };
      const batch = {};
      Object.keys(members).forEach((uid) => {
        batch[`userChats/${uid}/${groupId}`] = preview;
      });
      await update(ref(db), batch);
      alert("Группа создана. Откройте её через поиск.");
    }

    async function logout() {
      if (state.currentUser?.usernameKey) {
        await update(ref(db, `presence/${state.currentUser.usernameKey}`), { online: false, lastSeen: serverTimestamp() });
      }
      if (unsub.dialogs) unsub.dialogs();
      if (unsub.messages) unsub.messages();
      if (unsub.presence) unsub.presence();
      state.currentUser = null;
      state.activeChat = null;
      state.selectedMessageId = null;
      clearAuthArtifacts();
      $("chatPage").style.display = "none";
      $("authPage").style.display = "grid";
      $("dialogsList").innerHTML = "";
      $("searchResults").innerHTML = "";
      $("messageInput").value = "";
      setActionPanelVisible(false);
    }

    async function restoreSession() {
      const raw = localStorage.getItem(LS_SESSION);
      if (!raw) return;
      try {
        const session = JSON.parse(raw);
        if (!session?.usernameKey) return;
        const snap = await get(ref(db, `users/${session.usernameKey}`));
        clearAuthArtifacts();
        if (snap.exists()) {
          const saved = snap.val();
          $("usernameInput").value = String(saved.username || "").trim();
          $("passwordInput").value = "";
          setStatus("Сессия найдена. Введите пароль для входа.");
        }
      } catch {
        clearAuthArtifacts();
      }
    }

    function bindEvents() {
      $("loginTab").addEventListener("click", () => setAuthMode("login"));
      $("registerTab").addEventListener("click", () => setAuthMode("register"));
      $("meLogin").addEventListener("click", () => editMyProfile().catch(() => {}));
      $("chatTitle").addEventListener("click", async () => {
        if (!state.activeChat || state.activeChat.type !== "private") return;
        const snap = await get(ref(db, `users/${toKey(state.activeChat.peer)}`));
        if (snap.exists()) openProfile(snap.val());
      });

      $("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (isAuthSubmitting) return;
        const loginValue = $("usernameInput").value.trim();
        const password = $("passwordInput").value;

        if (!isValidLogin(loginValue)) {
          setStatus("Логин: 3-24 символа, только A-Z, 0-9, _, ., -", true);
          return;
        }
        if (password.length < 6) {
          setStatus("Пароль должен быть не короче 6 символов.", true);
          return;
        }

        try {
          setAuthLoading(true);
          setStatus(state.mode === "login" ? "Выполняется вход..." : "Выполняется регистрация...");
          const user = state.mode === "login" ? await login(loginValue, password) : await register(loginValue, password);
          setStatus("Успешно.");
          await beginSession(user);
        } catch (err) {
          setStatus(err?.message || "Ошибка авторизации.", true);
        } finally {
          setAuthLoading(false);
        }
      });

      let timer = null;
      $("searchInput").addEventListener("input", () => {
        clearTimeout(timer);
        const value = $("searchInput").value;
        timer = setTimeout(() => { if (state.currentUser) searchAll(value).catch(() => renderSearch([])); }, 220);
      });

      $("composer").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!state.currentUser || !state.activeChat || isSendingMessage) return;
        const input = $("messageInput");
        const text = input.value;
        input.value = "";
        isSendingMessage = true;
        $("sendBtn").disabled = true;
        $("sendBtn").textContent = "Отправка...";

        try {
          await sendMessage(text);
        } catch {
          input.value = text;
        } finally {
          isSendingMessage = false;
          $("sendBtn").disabled = false;
          $("sendBtn").textContent = "Отправить";
        }
      });

      $("logoutBtn").addEventListener("click", () => logout().catch(() => {}));
      $("deleteChatBtn").addEventListener("click", () => deleteChatWithActive().catch(() => {}));
      $("mobileBack").addEventListener("click", () => setMobileState("state-list"));

      $("messageViewport").addEventListener("click", () => {
        state.selectedMessageId = null;
        highlightSelectedMessage();
        setActionPanelVisible(false);
      });

      window.addEventListener("keydown", (event) => {
        if (event.ctrlKey && event.key.toLowerCase() === "g") {
          event.preventDefault();
          createGroupPrompt().catch(() => {});
        }
      });
    }

    function init() {
      guardAuthAccess();
      bindEvents();
      restoreSession().catch(() => {});
    }

    init();
  </script>
</body>
</html>
