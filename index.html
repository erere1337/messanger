<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messenger Pro</title>
  <style>
    :root {
      --bg-0: #0b1022;
      --card: rgba(255,255,255,.1);
      --card-strong: rgba(255,255,255,.15);
      --text: #edf1ff;
      --muted: #a0acd1;
      --accent: #6378ff;
      --accent2: #03c39a;
      --danger: #ff6d8f;
      --border: rgba(255,255,255,.16);
      --shadow: 0 18px 38px rgba(6,10,30,.45);
    }
    [data-theme="light"] {
      --bg-0: #eef3ff;
      --card: rgba(255,255,255,.9);
      --card-strong: rgba(255,255,255,.98);
      --text: #1d2748;
      --muted: #66759a;
      --accent: #4d5eff;
      --accent2: #05b68f;
      --danger: #ea4665;
      --border: rgba(28,44,92,.14);
      --shadow: 0 14px 28px rgba(42,67,140,.16);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh;
      font-family: Inter, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at 10% 0%, #3c50e7 0%, transparent 34%),
        radial-gradient(circle at 90% 0%, #10bfc0 0%, transparent 28%),
        var(--bg-0);
      color: var(--text);
      overflow:hidden;
    }
    .hidden{display:none!important}
    .top-right {
      position:fixed; right:12px; top:12px; z-index:20;
    }
    .icon-btn {
      width:38px;height:38px;border-radius:50%;cursor:pointer;
      border:1px solid var(--border);background:var(--card-strong);color:var(--text);
      box-shadow:var(--shadow);
    }
    .center { min-height:100vh; display:grid; place-items:center; padding:20px; }
    .card {
      width:min(480px,96vw); padding:22px; border-radius:24px;
      border:1px solid var(--border); background:var(--card); box-shadow:var(--shadow);
      backdrop-filter: blur(12px);
    }
    .title{font-size:28px;font-weight:800;margin-bottom:6px}
    .muted{color:var(--muted)}
    .tabs{display:flex;gap:8px;margin-top:16px}
    input,button{
      width:100%;padding:12px 13px;border-radius:12px;font-size:14px;
      border:1px solid var(--border);background:var(--card-strong);color:var(--text);
    }
    button{cursor:pointer;font-weight:600}
    .tab.active,.btn-primary{background:linear-gradient(135deg,var(--accent),#8f62ff);color:#fff;border-color:transparent}
    .btn-success{background:linear-gradient(135deg,#0ebf8f,var(--accent2));border-color:transparent;color:#05241d}
    .btn-danger{background:rgba(255,100,130,.22);border-color:rgba(255,130,150,.4)}
    .field{display:grid;gap:8px;margin-top:12px}
    .status{min-height:22px;margin-top:10px;font-size:13px;color:var(--muted)}
    .status.error{color:#ff9cb2}

    .app {
      height:100vh; display:grid; grid-template-columns:330px 1fr; gap:12px; padding:12px;
    }
    .panel {
      border:1px solid var(--border); border-radius:18px; background:var(--card);
      box-shadow:var(--shadow); backdrop-filter: blur(10px); overflow:hidden; display:flex; flex-direction:column; min-height:0;
    }
    .head{padding:14px;border-bottom:1px solid var(--border);display:grid;gap:8px}
    .profile{display:flex;align-items:center;gap:10px}
    .avatar{
      width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
      background:linear-gradient(145deg,var(--accent),#af4fff);color:#fff;font-weight:800;
    }
    .name{font-weight:700}
    .sub{color:var(--muted);font-size:12px}
    .list{overflow:auto;display:flex;flex-direction:column;gap:8px;padding:10px;min-height:0}
    .item{border:1px solid var(--border);background:var(--card-strong);padding:10px;border-radius:12px;cursor:pointer}
    .item.active{outline:2px solid var(--accent)}
    .line1{display:flex;justify-content:space-between;gap:8px;font-weight:700}
    .line2{margin-top:3px;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hint{padding:8px 12px;border-top:1px dashed var(--border);font-size:12px;color:var(--muted)}

    .main{display:grid;grid-template-rows:auto 1fr auto;min-height:0}
    .chat-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
    .left{display:flex;align-items:center;gap:10px;min-width:0}
    .presence{width:9px;height:9px;border-radius:50%;display:inline-block;background:#8a94bc;margin-right:6px}
    .presence.online{background:#00d37a;box-shadow:0 0 0 3px rgba(0,211,122,.2)}
    .messages{padding:14px;overflow:auto;display:flex;flex-direction:column;gap:9px;min-height:0}
    .empty{margin:auto;text-align:center;color:var(--muted);max-width:380px;line-height:1.5;padding:20px}
    .msg{max-width:76%;padding:10px 12px;border-radius:15px;border:1px solid var(--border);background:var(--card-strong);word-break:break-word}
    .msg.me{align-self:flex-end;background:linear-gradient(145deg,var(--accent),#8f62ff);color:#fff;border:none}
    .meta{margin-top:4px;font-size:11px;opacity:.85}
    .composer{border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 50px 130px;gap:8px;padding:12px}

    @media(max-width:980px){.app{grid-template-columns:1fr;grid-template-rows:42vh 1fr}}
  </style>
</head>
<body>
  <div class="top-right">
    <button id="themeBtn" class="icon-btn" title="Тема">🌙</button>
  </div>

  <section id="authView" class="center">
    <div class="card">
      <div class="title">💬 Messenger Pro</div>
      <p class="muted">Вход/регистрация, поиск по логину и личные чаты в реальном времени.</p>

      <div class="tabs">
        <button id="loginTab" class="tab active" type="button">Вход</button>
        <button id="registerTab" class="tab" type="button">Регистрация</button>
      </div>

      <form id="authForm" class="field">
        <input id="emailInput" type="email" required placeholder="Email" />
        <input id="passwordInput" type="password" minlength="6" required placeholder="Пароль (6+ символов)" />
        <input id="usernameInput" class="hidden" type="text" minlength="3" maxlength="24" placeholder="Логин: a-z, 0-9, _, ." />
        <button id="authSubmit" class="btn-primary" type="submit">Войти</button>
      </form>
      <div id="authStatus" class="status"></div>
    </div>
  </section>

  <section id="appView" class="app hidden">
    <aside class="panel">
      <div class="head">
        <div class="profile">
          <div id="meAvatar" class="avatar">U</div>
          <div style="min-width:0;">
            <div id="meName" class="name">@username</div>
            <div id="meEmail" class="sub">email@example.com</div>
          </div>
        </div>
        <input id="searchInput" type="text" placeholder="Найти пользователя по логину" />
      </div>

      <div class="hint">Результаты поиска</div>
      <div id="searchList" class="list"></div>

      <div class="hint">Ваши диалоги</div>
      <div id="dialogsList" class="list"></div>

      <div class="head">
        <button id="logoutBtn" class="btn-danger" type="button">Выйти</button>
      </div>
    </aside>

    <main class="panel main">
      <header class="chat-head">
        <div class="left">
          <div id="chatAvatar" class="avatar">?</div>
          <div style="min-width:0;">
            <div id="chatTitle" class="name">Выберите диалог</div>
            <div class="sub"><span id="presenceDot" class="presence"></span><span id="presenceText">—</span></div>
          </div>
        </div>
        <button id="howBtn" type="button">Как начать чат?</button>
      </header>

      <div id="messages" class="messages">
        <div class="empty">Найдите пользователя по логину слева и нажмите на него, чтобы открыть диалог.</div>
      </div>

      <form id="composer" class="composer">
        <input id="messageInput" type="text" maxlength="2000" placeholder="Введите сообщение..." />
        <button id="emojiBtn" type="button">😊</button>
        <button class="btn-success" type="submit">Отправить</button>
      </form>
    </main>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics, isSupported as analyticsSupported } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp, collection, query, where, orderBy, limit, onSnapshot, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBalx-yReG31BkexcSYkX6CknHh_m_St2M",
      authDomain: "messanger-b98dd.firebaseapp.com",
      projectId: "messanger-b98dd",
      storageBucket: "messanger-b98dd.firebasestorage.app",
      messagingSenderId: "389022023604",
      appId: "1:389022023604:web:5e89db01e9b9fa1aa8bce1",
      measurementId: "G-VRV1YXQRP2"
    };

    const LS_THEME = "messenger_theme_v3";
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    analyticsSupported().then((ok) => { if (ok) getAnalytics(app); });

    const $ = (id) => document.getElementById(id);

    let mode = "login";
    let me = null;
    let meProfile = null;
    let activeChatId = null;
    let unsubDialogs = null;
    let unsubMessages = null;
    let unsubPresence = null;

    function initials(value) {
      const clean = (value || "?").replace(/[^a-zA-Zа-яА-Я0-9]/g, "").slice(0, 2).toUpperCase();
      return clean || "?";
    }

    function setStatus(text = "", isError = false) {
      const el = $("authStatus");
      el.textContent = text;
      el.classList.toggle("error", isError);
    }

    function normalizeUsername(v) {
      return v.trim().toLowerCase();
    }

    function validUsername(v) {
      return /^[a-z0-9_.]{3,24}$/.test(v);
    }

    function makeChatId(a, b) {
      return [a, b].sort().join("__");
    }

    function setTheme() {
      const t = localStorage.getItem(LS_THEME) || "dark";
      document.documentElement.setAttribute("data-theme", t);
      $("themeBtn").textContent = t === "light" ? "🌙" : "☀️";
    }

    function toggleTheme() {
      const now = document.documentElement.getAttribute("data-theme") || "dark";
      localStorage.setItem(LS_THEME, now === "dark" ? "light" : "dark");
      setTheme();
    }

    function setMode(next) {
      mode = next;
      const reg = next === "register";
      $("loginTab").classList.toggle("active", !reg);
      $("registerTab").classList.toggle("active", reg);
      $("usernameInput").classList.toggle("hidden", !reg);
      $("usernameInput").required = reg;
      $("authSubmit").textContent = reg ? "Создать аккаунт" : "Войти";
      setStatus();
    }

    function route(isAuthed) {
      $("authView").classList.toggle("hidden", isAuthed);
      $("appView").classList.toggle("hidden", !isAuthed);
    }

    async function ensureProfile(user, username) {
      const uname = normalizeUsername(username);
      const unameRef = doc(db, "usernames", uname);
      const uSnap = await getDoc(unameRef);
      if (uSnap.exists() && uSnap.data().uid !== user.uid) {
        throw new Error("Этот логин уже занят.");
      }

      await setDoc(unameRef, { uid: user.uid, username: uname }, { merge: true });
      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        email: user.email || "",
        username: uname,
        usernameSearch: uname,
        online: true,
        lastSeen: serverTimestamp(),
        updatedAt: serverTimestamp(),
        createdAt: serverTimestamp()
      }, { merge: true });
    }

    async function loadMe(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      if (!snap.exists()) throw new Error("Профиль не найден.");
      meProfile = snap.data();
      $("meName").textContent = `@${meProfile.username}`;
      $("meEmail").textContent = meProfile.email || "Без email";
      $("meAvatar").textContent = initials(meProfile.username);
    }

    async function setPresence(online) {
      if (!me) return;
      try {
        await updateDoc(doc(db, "users", me.uid), {
          online,
          lastSeen: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      } catch {
      }
    }

    function clearSubs() {
      if (unsubDialogs) { unsubDialogs(); unsubDialogs = null; }
      if (unsubMessages) { unsubMessages(); unsubMessages = null; }
      if (unsubPresence) { unsubPresence(); unsubPresence = null; }
    }

    async function register(email, password, username) {
      const uname = normalizeUsername(username);
      if (!validUsername(uname)) throw new Error("Логин: a-z, 0-9, _, ., длина 3-24.");
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await ensureProfile(cred.user, uname);
    }

    async function login(email, password) {
      await signInWithEmailAndPassword(auth, email, password);
    }

    function renderSearch(users) {
      const root = $("searchList");
      root.innerHTML = "";
      if (!users.length) {
        root.innerHTML = `<div class="muted" style="padding:8px;">Введите минимум 2 символа.</div>`;
        return;
      }
      users.forEach((u) => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `<div class="line1"><span>@${u.username}</span><span class="muted">${u.online ? "online" : "offline"}</span></div><div class="line2">${u.email || "Без email"}</div>`;
        el.onclick = () => openOrCreateDialog(u);
        root.appendChild(el);
      });
    }

    async function searchUsers(prefix) {
      const p = normalizeUsername(prefix);
      if (p.length < 2) return renderSearch([]);
      const qRef = query(
        collection(db, "users"),
        where("usernameSearch", ">=", p),
        where("usernameSearch", "<=", `${p}\uf8ff`),
        orderBy("usernameSearch"),
        limit(20)
      );
      const snap = await getDocs(qRef);
      const users = snap.docs.map((d) => d.data()).filter((u) => u.uid && u.uid !== me.uid);
      renderSearch(users);
    }

    async function openOrCreateDialog(other) {
      const id = makeChatId(me.uid, other.uid);
      const ref = doc(db, "dialogs", id);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          id,
          participants: [me.uid, other.uid],
          usernames: { [me.uid]: meProfile.username, [other.uid]: other.username },
          lastMessageText: "",
          lastMessageAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          createdAt: serverTimestamp()
        });
      } else {
        await updateDoc(ref, { updatedAt: serverTimestamp() });
      }
      openDialog(id, other);
    }

    function bindPresence(uid) {
      if (unsubPresence) { unsubPresence(); unsubPresence = null; }
      unsubPresence = onSnapshot(doc(db, "users", uid), (snap) => {
        if (!snap.exists()) return;
        const u = snap.data();
        const online = !!u.online;
        $("presenceDot").classList.toggle("online", online);
        if (online) {
          $("presenceText").textContent = "в сети";
        } else {
          const t = u.lastSeen?.toDate ? u.lastSeen.toDate().toLocaleString() : "давно";
          $("presenceText").textContent = `был(а) ${t}`;
        }
      });
    }

    function renderMessages(docs) {
      const box = $("messages");
      box.innerHTML = "";
      if (!docs.length) {
        box.innerHTML = `<div class="empty">Пока нет сообщений. Напишите первым 👋</div>`;
        return;
      }
      docs.forEach((ds) => {
        const m = ds.data();
        const mine = m.senderId === me.uid;
        const t = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleString() : "сейчас";
        const el = document.createElement("div");
        el.className = `msg ${mine ? "me" : ""}`;
        el.innerHTML = `<div>${m.text}</div><div class="meta">${m.senderUsername} • ${t}</div>`;
        box.appendChild(el);
      });
      box.scrollTop = box.scrollHeight;
    }

    function openDialog(id, other) {
      activeChatId = id;
      $("chatTitle").textContent = `@${other.username}`;
      $("chatAvatar").textContent = initials(other.username);
      bindPresence(other.uid);

      if (unsubMessages) { unsubMessages(); unsubMessages = null; }
      const qRef = query(collection(db, "dialogs", id, "messages"), orderBy("createdAt", "asc"), limit(300));
      unsubMessages = onSnapshot(qRef, (snap) => renderMessages(snap.docs));

      [...$("dialogsList").children].forEach((el) => el.classList.toggle("active", el.dataset.id === id));
    }

    async function sendMessage(text) {
      if (!activeChatId || !text.trim()) return;
      const payload = {
        text: text.trim(),
        senderId: me.uid,
        senderUsername: meProfile.username,
        createdAt: serverTimestamp()
      };
      await addDoc(collection(db, "dialogs", activeChatId, "messages"), payload);
      await updateDoc(doc(db, "dialogs", activeChatId), {
        lastMessageText: payload.text,
        lastMessageAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      $("messageInput").value = "";
    }

    function renderDialogs(docs) {
      const root = $("dialogsList");
      root.innerHTML = "";
      if (!docs.length) {
        root.innerHTML = `<div class="muted" style="padding:8px;">У вас пока нет диалогов.</div>`;
        return;
      }
      docs.forEach((ds) => {
        const d = ds.data();
        const otherUid = d.participants.find((uid) => uid !== me.uid);
        const otherName = d.usernames?.[otherUid] || "unknown";
        const tm = d.lastMessageAt?.toDate ? d.lastMessageAt.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";

        const el = document.createElement("div");
        el.className = `item ${ds.id === activeChatId ? "active" : ""}`;
        el.dataset.id = ds.id;
        el.innerHTML = `<div class="line1"><span>@${otherName}</span><span class="muted">${tm}</span></div><div class="line2">${d.lastMessageText || "Без сообщений"}</div>`;
        el.onclick = () => openDialog(ds.id, { uid: otherUid, username: otherName });
        root.appendChild(el);
      });
    }

    function subscribeDialogs() {
      if (unsubDialogs) { unsubDialogs(); unsubDialogs = null; }
      const qRef = query(
        collection(db, "dialogs"),
        where("participants", "array-contains", me.uid),
        orderBy("lastMessageAt", "desc"),
        limit(50)
      );
      unsubDialogs = onSnapshot(qRef, (snap) => renderDialogs(snap.docs));
    }

    function bindEvents() {
      $("themeBtn").onclick = toggleTheme;
      $("loginTab").onclick = () => setMode("login");
      $("registerTab").onclick = () => setMode("register");

      $("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = $("emailInput").value.trim();
        const password = $("passwordInput").value;
        const username = $("usernameInput").value.trim();
        try {
          setStatus("Проверка...");
          if (mode === "register") await register(email, password, username);
          else await login(email, password);
        } catch (err) {
          setStatus(err.message || "Ошибка авторизации", true);
        }
      });

      $("searchInput").addEventListener("input", (e) => {
        searchUsers(e.target.value).catch(console.error);
      });

      $("composer").addEventListener("submit", async (e) => {
        e.preventDefault();
        await sendMessage($("messageInput").value);
      });

      $("emojiBtn").onclick = () => {
        const i = $("messageInput");
        i.value += " 😊";
        i.focus();
      };

      $("howBtn").onclick = () => alert("Введите логин пользователя в поле поиска слева и нажмите на найденного пользователя.");

      $("logoutBtn").onclick = async () => {
        await setPresence(false);
        await signOut(auth);
      };

      window.addEventListener("focus", () => setPresence(true));
      window.addEventListener("blur", () => setPresence(false));
      window.addEventListener("beforeunload", () => { setPresence(false); });
    }

    function boot() {
      setTheme();
      bindEvents();

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          me = null;
          meProfile = null;
          activeChatId = null;
          clearSubs();
          route(false);
          return;
        }

        me = user;
        try {
          await loadMe(user.uid);
          await setPresence(true);
        } catch (err) {
          await signOut(auth);
          route(false);
          setStatus(`Ошибка профиля: ${err.message}`, true);
          return;
        }

        route(true);
        setStatus("");
        subscribeDialogs();
      });
    }

    boot();
  </script>
</body>
</html>
